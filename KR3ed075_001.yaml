body:
  text: 卷一補中益氣湯治陰虛內熱頭痛口渴表熱自汗不任風寒脈洪大心煩不安四肢困倦懶於言語無氣以動動則氣高而喘黃耆人參云術炙甘草陳皮當歸升麻柴胡上八味加生薑三片大棗二枚水煎溫服柯韻伯曰仲景有建中理中二法風木內干中氣用甘草飴棗培土以御風薑桂芍藥驅風而瀉木故名曰建中寒水內凌於中氣用參朮甘草補土以制水佐乾薑而生土以禦寒故名曰理中至若勞倦形氣衰少陰虛而生內熱者表症頗同外感惟東垣知其為勞倦傷脾穀氣不盛陽氣下陷陰中而發熱制補中益氣之法謂風寒外傷其形為有餘脾胃內傷其氣為不足遵內經勞者溫之損者益之之義大忌苦寒之藥選用甘溫之品升其陽以行春生之令凡脾胃一虛肺氣先絕故用黃耆護皮毛而開腠理不令自汗元氣不足懶言氣喘人參以補之炙甘草之甘以瀉心火而除煩補脾胃而生氣此三味除煩熱之聖藥也佐白朮以健脾當歸以和血氣亂於胸清濁相干用陳皮以理之且以散諸甘藥之滯胃中清氣下沉用升麻柴胡氣之輕而味之薄者引胃氣以上騰復其本位便能升浮以行生長之令矣補中之劑得發表之品而中自安益氣之劑賴清氣之品而氣益倍此用藥有相須之妙也是方也用以補脾使地道卑而上行亦可以補心肺損其肺者益其氣損其心者調其營衛也亦可以補肝木鬱則達之也惟不宜於腎陰虛於下者不宜升陽虛於下者更不宜升也凡東垣治脾胃方俱是益氣去當歸白朮加蒼朮木香便是調中加麥冬五味輩便是清暑此正是醫不執方亦正是醫必有方趙養葵曰後天脾土非得先天之氣不行此氣因勞而下陷於腎肝清氣不升濁氣不降故用升柴以佐參耆是方所以補益後天中之先天也益後天中之先天後人未發凡脾胃喜甘而惡苦喜補而惡攻喜溫而惡寒喜通而惡滯喜升而惡降喜燥而惡濕此方得之陸麗京曰此為清陽下陷者言之非為下虛而清陽不升者言之也倘人之兩尺虛微者或是癸水消竭或是命門火衰若再一升提則如大木將搖而拔其本也此韻伯所謂獨不宜於腎也周慎齋曰下體痿弱虛弱者不可用補中必當以八味丸治之凡內傷作瀉藏附子於白朮中令其守中以止泄也表熱藏附子於黃耆中欲其走表以助陽也黃耆建中湯治虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥諸不足黃耆膠飴白芍甘草桂枝生薑大棗上七味水煎服喻氏曰虛勞而至於亡血失精津液枯槁難為力矣內經於針藥所莫制者調以甘藥金匱遵之而用黃耆建中湯急建其中氣俾飲食增而津液旺以至充血生精而復其真陰之不足但用稼穡作甘之本味而酸辛鹹苦在所不用蓋舍此別無良法也然用法貴立於無過之地寧但嘔家不可用建中之甘即服甘藥微覺氣阻氣滯更當慮甘藥太過令人中滿早用陳皮砂仁以行之可也不然甘藥又不可恃更將何所恃哉後人多用樂令建中湯十四味建中湯雖無過甘之弊然樂令方中前胡細辛為君意在退熱而陰虛之熱則不可退十四味方中用附桂蓯蓉意在復陽而陰虛之陽未必可復又在用方之善為裁酌矣又曰傷寒有小建中一法治二三日心悸而煩以其人中氣餒弱不能送邪外出故用飴糖之甘小小建立中氣以祛邪也金匱有黃耆建中一法加黃耆治虛勞裡急自汗表虛肺虛諸不足症而建其中之衛氣也金匱復有大建中一法以其人陰氣上逆胸中大寒嘔不能食而腹痛至極用蜀椒乾薑人參飴糖大建其中之陽以驅逐濁陰也後人復廣其義曰樂令建中湯治虛勞發熱以下並建其中之營血曰十四味建中湯治臟氣裡虛以之兩建其脾中腎中之陽陰仲景為祖後人為孫使虛羸之體服建中之後可汗可下誠足恃也至理中則燮理之義治中則分治之義補中溫中莫非惠先京國之義緣傷寒外邪逼域中法難盡用仲景但於方首以小之一字示其微義至金匱始盡建中之義後人引伸觸類曲暢建中之旨學者心手之間所當會其大義也人參養榮湯治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉等症若氣血虛而變見諸症勿論其病其脈但用此湯諸症悉退人參白朮茯苓甘草黃耆陳皮當歸熟地白芍五味子桂心遠志上十二味加姜三片棗二枚水煎服柯韻伯曰古人治氣虛以四君治血虛以四物氣血俱虛者以八珍更加黃耆肉桂名十全大補宜乎萬舉萬當也而用之有不獲效者蓋補氣而不用行氣之品則氣虛之甚者無氣以受其補補血而仍用行血之物於其間則血虛之甚者更無血以流行議方確妙故加陳皮以行氣而補氣者悉得效其用去川芎行血之味而補血者因以奏其功此善治者只一加一減便能轉旋造化之機也然氣可召而至血易虧難成苟不有以求其血脈之主而養之則營氣終歸不足故倍人參為君而佐以遠志之苦先入心以安神定志使甘溫之品始得化而為血以奉生身又心苦緩必得五味子之酸以收斂神明使營行脈中而流於四臟名之曰養榮不必仍十全之名而收效有如此者歸脾湯治思慮傷脾或健忘怔忡驚悸盜汗寤而不寐或心脾作痛嗜臥少食月經不調人參黃耆甘草白朮茯苓木香龍眼肉酸棗仁當歸遠志姜三片水煎服羅東逸曰方中龍眼棗仁當歸所以補心也參耆朮苓草所以補脾也立齋加入遠志又以腎藥之通乎心者補之是兩經兼腎合治矣而特名歸脾何也夫心藏神其用為思脾藏智其出為意是神智思意火土合德者也心以經營之久而傷脾以意慮之鬱而傷則母病必傳諸子子又能令母虛所必然也其症則怔忡怵惕煩躁之徵見於心飲食倦怠不能運思手足無力耳目昏眊之症見於脾故脾陽苟不運心腎必不交彼黃婆者若不為之媒合則已不能攝腎歸心而心陰何所賴以養此取坎填離者所以必歸之脾也其藥一滋心陰一養脾陽取乎健者以壯子益母然恐脾郁之久傷之特甚故有取木香之辛且散者以開氣醒脾使能急通脾氣以上行心陰脾之所歸正在斯耳張路玉曰補中益氣與歸脾同出保元並加歸術而有升舉胃氣滋補脾陰之不同此方滋養心脾鼓動少火妙以木香調暢諸氣世以木香性燥不用服之多致痞悶或泄瀉減食者以其純陰無陽不能輸化藥力故耳保元湯治氣虛血弱之總方也小兒驚痘家虛者最宜黃耆三錢人參二錢甘草一錢肉桂春夏二三分秋冬六七分上四味水煎服柯韻伯曰保元者保守其元氣之謂也氣一而已主腎為先天真元之氣主胃為後天水穀之氣者此指發生而言也又水穀之精氣行於經隧為營氣水穀之悍氣行於脈外為衛氣大氣之積於胸中而司呼吸者為宗氣是分後天運用之元氣而為三也又外應皮毛協營衛而主一身之表者為太陽膀胱之氣內通五臟司治節而主一身之裡者為太陰肺經之氣通行內外應腠理而主一身之半表半裡者為少陽三焦之氣是分先天運行之元氣而為三也條分諸氣足開後學之蒙此方用黃耆護表人參固里甘草和中三氣治而元氣足矣昔李東垣以此三味能瀉火補金培土為除煩熱之聖藥鎮小兒驚效如桴鼓魏桂岩得之以治痘家陽虛頂陷血虛漿清皮薄發癢難灌難斂者始終用之以為血脫須補氣陽生則陰長有起死回生之功故名之為保元也又少佐肉桂分四時之氣而增損之謂桂能治血以推動其毒扶陽益氣以充達周身血在內引之出表則氣從內托血外散引之歸根則氣從外護參耆非桂引道不能獨樹其功桂不得甘草和平氣血亦不能緒其條理要非寡聞淺見者能窺其萬一也四君中不用白朮避其燥不用茯苓恐其滲也用桂而不用四物者芎之辛散歸之濕潤芍之酸寒地黃之泥滯故耳如宜燥則加苓術宜潤加歸宜收加芍當散加芎又表實去耆裡實去參中滿忌甘內熱除桂斯又當理會矣推明加減其法燦然又云人知火能剋金而不知氣能勝火人知金能生水而不知氣即是水此義惟東垣知之故曰參耆甘草除煩熱之聖藥要知氣旺則火邪自退丹溪雲氣有餘便是火不知氣上騰便是水妙理獨發四君子湯治面色痿白言語輕微四肢無力脈來虛弱者若內熱或飲食難化作酸乃屬虛火須加炮姜人參白朮茯苓甘草各二錢水煎加薑棗加陳皮為五味異功散加陳皮半夏為六君子湯張路玉曰氣虛者補之以甘參朮苓草甘溫益胃有健運之功具沖和之德故為君子若合之二陳則補中微有消導之意蓋人之一身以胃氣為本胃氣旺則五臟受蔭胃氣傷則百病叢生故凡病久不愈諸藥不效者惟有益胃補腎兩途故用四君子隨症加減無論寒熱補瀉先培中土使藥氣四達則周身之機運流通水穀之精微敷布何患其藥之不效哉是知四君六君為司命之本也更加砂仁木香名香砂六君子香砂六君子湯治氣虛腫滿痰飲結聚脾胃不和變生諸症者人參一錢白朮二錢茯苓二錢甘草七分陳皮八分半夏一錢砂仁八分木香七分上生薑二錢水煎服柯韻伯曰經曰壯者氣行則愈怯者著而為病蓋人在氣交之中因氣而生而生氣總以胃氣為本食入於陰長氣於陽晝夜循環周於內外一息不運便有積聚或脹滿不食或生痰留飲因而肌肉消瘦喘咳嘔噦諸症蜂起而神機化絕矣四君子氣分之總方也人參致沖和之氣白朮培中宮茯苓清治節甘草調五臟諸氣既治病安從來然撥亂反正又不能無為而治必舉夫行氣之品以輔之則補品不至泥而不行故加陳皮以利肺金之逆氣半夏以疏脾土之濕氣而痰飲可除也加木香以行三焦之滯氣縮砂以通脾腎之元氣憤郁可開也四君得四輔而補力倍宣四輔有四君而元氣大振相須而益彰者乎四物湯治一切血虛血熱血燥諸症當歸熟地各三錢川芎一錢五分白芍二錢酒炒上四味水煎服張路玉曰四物為陰血受病之專劑非調補真陰之的方方書咸謂四物補陰遂以治陰虛發熱火炎失血等症蒙害至今又專事女科者咸以此湯隨症漫加風食痰氣等藥紛然雜出其最可恨者莫如坎離丸之迅掃虛陽四物二連之斬削真氣而庸工利其有劫病之能咸樂用之何異於操刀行劫耶先輩治上下失血過多一切血藥置而不用獨推獨參湯童便以固其脫者以有形之血不能速生無形之氣所當急固也昔人有言見血無治血必先調其氣又云四物湯不得補氣藥不能成陽生陰長之功誠哉言也然余嘗謂此湯傷寒火邪解後餘熱留於血分至夜微熱不除或合柴胡或加桂枝靡不應手輒效不可沒其功也聖愈湯治一切失血或血虛煩渴燥熱睡臥不寧五心煩熱作渴等症四物湯加人參黃耆一方去芍藥上水煎服柯韻伯曰經曰陰在內陽之守也陽在外陰之使也故陽中無陰謂之孤陽陰中無陽謂之死陰丹溪曰四物皆陰行天地閉塞之令非長養萬物者也故四物加知柏久服便能絕孕謂其嫌於無陽耳此方取參耆配四物以治陰虛血脫等症蓋陰陽互為其根陰虛則陽無所附所以煩熱燥渴而陽亦亡氣血相為表裡血脫則氣無所歸所以睡臥不寧而氣亦脫然陰虛無驟補之法計在存陽血脫有生血之機必先補氣此陽生陰長血隨氣行之理也故曰陰虛則無氣無氣則死矣此方得仲景白虎加人參之義而擴充者乎前輩治陰虛用八珍十全卒不獲效者因甘草之甘不達下焦白朮之燥不利脾腎茯苓滲泄礙乎生升肉桂辛熱動其虛火此六味皆醇厚和平而滋潤服之則氣血疏通內外調和合於聖度矣當歸補血湯治男婦肌熱面赤煩渴引飲脈來洪大而虛重按全無當歸二錢黃耆一兩水煎服吳鶴皋曰血實則身涼血虛則身熱或以飢困勞役虛其陰血則陽獨治故諸症生焉此證純象白虎但脈大而虛非大而長為辨耳內經所謂脈虛血實是也當歸味厚為陰中之陰故能養血黃耆則味甘補氣者也今黃耆多數倍而云補血者以有形之血不能自生生於無形之氣故也內經雲陽生陰長是之謂耳酸棗仁湯治虛勞虛煩不得眠酸棗仁二升甘草一兩知母二兩茯苓二兩川芎二兩上五味以水八升煮棗仁得六升納藥煮取三升分溫三服羅東逸曰經曰肝藏魂人臥則血歸於肝又曰肝者罷極之本又曰陽氣者煩勞則張精絕故罷極必傷肝煩勞則精絕肝傷精絕則虛勞虛煩不得臥明矣棗仁酸平應少陽木化而治肝極者宜收宜補用棗仁至二升以生心血養肝血所謂以酸收之以酸補之是也顧肝鬱欲散散以川芎之辛散使輔棗仁通肝調營所謂以辛補之肝急欲緩緩以甘草之甘緩防川芎之疏肝泄氣所謂以土葆之然終恐勞極則火發於腎上行至肺則衛不合而仍不得眠故以知母崇水茯苓通陰將水壯金清而魂自寧斯神凝魂藏而魄且靜矣此治虛勞肝極之神方也養心湯治心神不足夢寐不寧驚悸健忘等症白芍當歸人參遠志麥門冬黃芩山藥芡實蓮鬚酸棗仁茯神石蓮子上十二味水煎服吳於宣曰難經云心不足者調其營衛營衛者血脈之所在而心主之故養心者莫善於調營衛也然營衛並出中州營淫精於肝而濁氣歸心衛氣通於肺而為心相腎受心營肺衛之歸而又升精於離以成水火既濟是三臟者皆心之助而調營衛者所必出於是也故調營衛調其四臟而心養矣是方人參茯神以神養心棗仁歸芍以母養肝山藥門冬黃芩以清養肺蓮鬚芡實石蓮遠志以澀養精而升之於是神明之君主泰然於天鈞之上矣此養心之旨也獨參湯治元氣虛而不支脈微欲絕及婦人血崩產後血暈人參分量隨人隨症須上揀者濃煎頓服待元氣漸回隨症加減柯韻伯曰一人而系一世之安危者必重其權而專任之則一物而系一人之死生者當重其分兩而獨用之春秋運鬥樞云搖光星散而為人參所以下有人參上有紫氣物華天寶洵神物也故先哲於氣虛血脫之症獨用人參三兩濃煎頓服之能挽回性命於瞬息之間非他物所可代世之用者恐或補住邪氣些少以姑試之或加消耗之味以監製之其權不重力不專人何賴以得生無論庸工莫知其理即負盛名者尚習焉不察可嘆如古方霹靂散獨聖散大補丸舉卿古拜等方皆用一物之長而取效最捷於獨參湯何疑耶然又當隨機應變視病機為轉旋故獨參湯中或加童便或加薑汁或加附子或加黃連相得相須而相與有成亦不礙其為獨如薛新甫治中風加人參兩許於三生飲中以駕馭其抑此真善用獨參湯者炙甘草湯治傷寒脈結代心動悸者外臺又治肺痿咳吐多心中溫溫液液者甘草四兩炙生地黃一斤麥冬半斤人參一兩桂枝三兩生薑二兩大棗十二枚阿膠二兩麻仁半斤上九味以酒七升水八升煮取三升去滓入膠溶盡溫服一升日三服一名復脈湯喻嘉言曰按此湯仲景傷寒門治邪少虛多脈結代心動悸之聖方也一名復脈湯千金翼用之以治虛勞外臺用之以治肺痿然本方所治亦何止於二病仲景諸方為生心之化裁亦若是而已矣外臺所取在於益肺氣之虛潤肺金之燥至於桂枝辛熱似有不宜而不知桂枝能通營衛致津液營衛通津液致則肺氣轉輸濁沫以漸而下尤為要藥所以云治心中溫溫液液者柯韻伯曰仲景於脈弱者用芍藥以滋陰桂枝以通血甚則加人參以生脈未有地黃麥冬者豈以傷寒之法義重扶陽乎抑陰無驟補之法與此以心虛脈代結用生地為君麥冬為臣峻補真陰開後學滋陰之路地黃麥冬味雖甘而氣大寒非發陳蕃莠之品必得人參桂枝以通脈生薑大棗以和營阿膠補血酸棗安神甘草之緩不使速下清酒之猛捷於上行內外調和悸可寧而脈可復矣酒七升水八升只取三升者久煎之則氣不峻此虛家用酒之法且知地黃麥冬得酒良逍遙散治肝家血虛火旺頭痛目眩頰赤口苦倦怠煩渴抑鬱不樂兩脅作痛寒熱小腹重墜婦人經水不調脈弦大而虛當歸芍藥酒炒白朮炒茯苓甘草炙柴胡各一錢加味逍遙散即此方加丹皮山梔炒各五分趙羽皇曰五臟苦欲補瀉云肝苦急急食甘以緩之蓋肝性急善怒其氣上行則順下行則鬱鬱則火動而諸病生矣故發於上則頭眩耳鳴而或為目赤發於中則胸滿脅痛而或作吞酸發於下則少腹疼疝而或溲溺不利發於外則寒熱往來似瘧非瘧凡此諸症何莫非肝鬱之象乎治肝之法盡矣而肝木之所以郁者其說有二一為土虛不能升木也一為血少不能養肝也蓋肝為木氣全賴土以滋培水以灌溉若中氣虛則九地不升而木因之郁陰血少則木無水潤而肝遂以枯養葵曰人知木剋土不知土升木知言哉方用白朮茯苓者助土德以升木也當歸芍藥者益營血以養肝也丹皮解熱於中草梔清火於下獨柴胡一味一以厥陰報使一以升發諸陽經云木鬱則達之柴胡其要矣二陳湯治肥盛之人濕痰為患喘嗽脹滿半夏三錢茯苓三錢陳皮三錢去白甘草一錢上四味加姜三片水煎服李士材曰肥人多濕濕挾熱而生痰火載氣而逆上半夏之辛利二便而去濕陳皮之辛通三焦而理氣茯苓佐半夏共成燥濕之功甘草佐陳皮同致調和之力成無己曰半夏行水氣而潤腎燥經曰辛以潤之是也行水則土自燥非半夏之性燥也半夏議明晰或曰有痰而渴宜去半夏代以貝母吳鶴皋曰渴而喜飲者易之不能飲水雖渴宜半夏也此濕為本熱為標所謂濕極而兼勝己之化非真象也又東南之人濕熱生痰故丹溪恆主之加枳實砂仁即名枳砂二陳湯其性較急也先哲曰二陳為治痰之妙劑其於上下左右無所不宜然止能治痰之標不能治痰之本痰本在脾在腎治者詳之生脈散治熱傷元氣氣短倦怠口乾出汗人參麥門冬五味子水煎服柯韻伯曰肺為嬌臟而朝百脈主一身元氣者也形寒飲冷則傷肺故傷寒有脈結代與脈微欲絕之危暑熱刑金則傷肺故傷熱有脈來虛散之足慮然傷寒是從前來者為實邪故雖脈不至而可復可通傷熱是從所不勝來者為賊邪非先從滋化其源挽回於未絕之前則一絕而不可復此孫真人為之急培元氣而以生脈名方也麥冬甘寒清權衡治節之司人參甘溫補後天營衛之本五味酸溫收先天天癸之原三氣通而三才立水升火降而合既濟之理矣仲景治傷寒有通脈復脈二法少陰病裡寒外熱下利清穀脈微欲絕者制通脈四逆湯溫補以扶陽厥陰病外寒內熱心動悸脈結代者制復脈湯涼補以滋陰同是傷寒同是脈病而寒熱異治者一挽坎陽之外亡一清相火之內熾也生脈散本復脈立法外無寒故不用薑桂之辛散熱傷無形之氣未傷有形之血故不用地黃阿膠麻仁大棗且不令其泥膈而滯脈道也心主脈而苦緩急食酸以收之故去甘草而加五味矣脈資始於腎資生於胃而會於肺仲景二方重任甘草者全賴中焦穀氣以通之復之非有待於生也此欲得下焦天癸之元氣以生之故不藉甘草之緩必取資於五味之酸矣理中湯治中氣不運腹中不實口失滋味病久不食臟腑不調與傷寒直中太陰自利不渴寒多而嘔等證人參白朮乾薑炮甘草炙各一錢五分水煎服加附子即名附子理中湯程郊倩曰陽之動始於溫溫氣得而穀精運穀氣升而中氣贍故名曰理中實以燮理之功予中焦之陽也若胃陽虛即中氣失宰膻中無發宣之用六腑無灑陳之功猶如釜薪失焰故下至清穀上失滋味五臟凌奪諸症所由來也參朮炙草所以固中州乾薑辛以守中必假之以焰釜薪而騰陽氣是以谷入於陰長氣於陽上輸華蓋下攝州都五臟六腑皆以受氣矣此理中之旨也若水寒互勝即當脾腎雙溫附子之加而命門益土母溫矣三因耆附朮附參附三湯治陽虛自汗寒濕沉痼陽虛陰盛黃耆一兩附子五錢名耆附湯白朮一兩附子五錢名朮附湯人參一兩附子五錢名參附湯水煎分三服喻嘉言曰衛外之陽不固而自汗則用耆附脾中之陽遏鬱而自汗則用朮附腎中之陽浮游而自汗則用參附凡屬陽虛自汗不能捨三方為治然三方之用大矣耆附可以治虛風朮附可以治寒濕參附可以壯元神三者亦交相為用若用其所當用功效若神誠足貴也以黃耆人參為君其長駕遠馭附子固不足以自恣術雖不足以制附然遇陽虛陰盛寒濕沉痼即生附在所必用何取制伏為耶金匱白朮附子湯中加甘草一味以治痹症豈非節制之師乎急症用其全力即不可制緩症用其半力即不可不制至如急中之緩緩中之急不制而制制而不制妙不能言清暑益氣湯長夏濕熱蒸炎四肢困倦精神減少身熱氣高煩心便黃渴而自汗脈虛者此方主之人參黃耆甘草白朮蒼朮一錢五分神麯青皮升麻乾葛麥冬五味當歸黃柏澤瀉廣皮水煎溫服吳鶴皋曰暑令行於夏至長夏則兼濕令矣此方兼而治之炎暑則表氣易泄兼濕則中氣不固黃耆所以實表白朮神麯甘草所以調中酷暑橫流肺金受病人參五味麥冬所以補肺斂肺清肺經所謂扶其所不勝也火盛則水衰故以黃柏澤瀉滋其化源津液亡則口渴故以當歸乾葛生其胃液清氣不升升麻可升濁氣不降二皮可理蒼朮之用為兼長夏濕也程郊倩曰人知清暑我兼益氣以暑傷氣也益氣不獨金能敵火凡氣之上騰而為津為液者向下即腎中之水水氣足火淫自卻也附暑門諸方論喻嘉言曰元豐朝立和劑局萃集醫家經驗之方於中暑一門獨詳以夏月暑證五方歷試見聞廣耳其取用小半夏茯苓湯不治其暑專治其濕又以半夏茯苓少加甘草名消暑丸見消暑在消其濕矣其香薷飲用香薷扁豆厚朴為主方熱盛則去扁豆加黃連為君治其心火濕甚則去黃連加茯苓甘草治其脾濕其縮脾飲則以脾為濕所浸淫而重滯於扁豆葛根甘草中佐以烏梅砂仁草果以快脾而去脾所惡之濕甚則用大順散來復丹以治暑證之多瀉利者又即縮脾之意而推之也其枇杷葉散則以胃為濕所竊據而濁穢故用香薷枇杷葉丁香白茅香之辛香以安胃而去胃所惡之臭甚則用冷香引子以治暑證之多嘔吐者又即枇杷葉散而推之也醫者於濕熱虛寒淺深緩急間酌而用之其利溥矣而後來諸賢以益虛繼之河間之桂苓甘露飲五苓三石意在生津液以益胃之虛子和之桂苓甘露飲用人參甘草葛根藿香木香益虛之中又兼去濁或用十味香薷飲於局方五味中增人參黃耆白朮陳皮木瓜益虛以去濕熱乃至東垣之清暑益氣湯人參黃耆湯又補中實衛以去其濕熱肥白內虛之人勿論中暑與否所宜頻服者也中暑必顯躁煩熱悶東垣仿仲景竹葉石膏湯之制方名清燥湯仍以去濕為首務夫燥與濕相反者也而清燥亦務除濕非東垣具過人之識不及此矣又如益元散之去濕而加辰砂則並去其熱五苓散之去濕而加人參則益虛加辰砂減桂則去熱白虎湯加人參則益虛加蒼朮則勝濕合之局方則大備矣然尚有未備者暑風一症猝倒類乎中風而未可從風門索治百一選方大黃龍丸初不為暑風立法而愚見從而贊之曰有中暍昏死灌之立蘇此可得治暑風一斑矣倘其人陰血素虧暑毒深入血分者良方復有地榆散治中暑昏迷不省人事而欲死者但用平常涼血之藥清解深入血分之暑風此以心火暴甚煎熬真陰舍清心涼血之外無可潑滅者美其名曰潑火散知言哉竹葉黃耆湯治消渴氣血虛胃火盛而作渴淡竹葉生地黃各二錢黃耆麥冬當歸川芎黃芩甘草芍藥人參半夏石膏各一錢上水煎服柯韻伯曰氣血皆虛胃火獨盛善治者補瀉兼施寒之而不致亡陽溫之而不至於助火扶正而邪卻矣四君子氣藥也加黃耆而去苓術恐火就燥也四物湯血藥也地黃只用生者正取其寒也人參黃耆甘草治煩熱之聖藥是補中有瀉矣且地黃之甘寒瀉心腎之火竹葉助芍藥清肝膽之火石膏佐芍藥清脾胃之火麥冬同黃芩清肺腸之火則胃火不得獨盛而氣血之得補可知惟半夏一味溫中辛散用之大寒劑中欲其通陰陽之路也岐伯治陰虛而目不瞑者飲以半夏湯覆杯則臥今人以為燥而渴者禁用是不明陰陽之理耳清燥救肺湯喻氏制論一條主治諸氣憤郁諸痿喘嘔桑葉經霜者三錢石膏二錢五分煅甘草一錢人參七分胡麻仁一錢炒研真阿膠八分麥冬一錢二分杏仁去皮尖炒黃七分枇杷葉去毛蜜炙用一片上九味以水一碗煎六分頻頻二三次滾熱服痰多加貝母栝蔞血枯加生地熱甚加犀角羚羊角或加牛黃喻嘉言曰按諸氣憤郁之屬於肺者屬於肺之燥也而古今治氣鬱之方用辛香行氣絕無一方治肺之燥者諸痿喘嘔之屬於上者亦屬於肺之燥也而古今治法以痿嘔屬陽明以喘屬肺是則嘔與痿屬之中下而惟喘屬上矣所以亦無一方及於肺之燥也即喘之屬於肺者非表即下非行氣即瀉氣間有一二用潤劑者又不得其肯綮今擬此方名清燥救肺大約以胃為主胃土為肺金之母也其天冬知母能清金滋水以苦寒而不用至如苦寒降火之藥尤在所忌蓋肺金自至於燥所存陰氣不過一線耳倘更以苦寒下其氣傷其胃其人尚有生理乎誠仿此增損以救肺燥變生諸症庶克有濟耳柯韻伯曰古方用香燥之品以治氣鬱不獲奏效者以火就燥也惟繆仲淳知之故用甘涼滋潤之品以清金保肺立法喻氏宗其旨集諸潤劑而制清燥救肺湯用意深取藥當無遺蘊矣石膏麥冬稟西方之色多液而甘寒培肺金主氣之源而氣可不郁土為金母子病則母虛用甘草調補中宮生氣之源而金有所恃金燥則水無以食氣而相生母令子虛矣取阿膠胡麻黑色通腎者滋其陰以上通生水之源而金始不孤西方虛則東實矣木實金平之二葉稟東方之色入通於肝枇杷葉外應毫毛固肝家之肺藥而經霜之桑葉非肺家之肝藥乎損其肺者益其氣人參之甘以補氣氣有餘便是火故佐杏仁之苦以降氣氣降火亦降而治節有權氣行則不郁諸痿喘嘔自除矣要知諸氣憤郁則肺氣必大虛若泥於肺熱傷肺之說而不用人參必郁不開而火愈熾皮聚毛落喘而不休此名之救肺涼而能補之謂也若謂實火可瀉而久服芩連反從火化亡可立待耳愚所以服膺此方而深贊之當歸六黃湯治陰虛有火令人盜汗者當歸生地熟地黃耆黃芩黃連黃柏水煎服季楚重曰汗本心之液其出入關乎肝肺營分開合肝司之衛分開合肺司之顧營衛各有所虛則各有所汗陽虛汗責在衛陰虛汗責在營然必相須為用衛氣不固於外由陰氣之不藏營氣失守於中由陽氣之不密故治盜汗之法有二一由肝血不足木不生火而心亦虛酸棗仁湯補肝即以補心也一以肝氣有餘木反侮金而肺亦虛當歸六黃湯治肝以治肺也是方當歸之辛養肝血黃連之苦清肝火一補一泄斯為主治肝火之動由水虛無以養生地涼營分之熱熟地補髓中之陰黃柏苦能堅腎是瀉南補北之義也肝木之實由金虛不能制黃耆益肺中之氣黃芩清肺中之熱是東實西虛之治也惟陰虛有火關尺脈旺者始宜若陰虛無氣津脫液泄又當以生脈六味固陰陽之根若用芩連柏苦寒傷胃使金水益虛木火益旺有措手不及之虞矣苓桂朮甘湯金匱治心下有痰飲胸脅支滿目眩又曰短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之腎氣丸已見茯苓四兩桂枝三兩白朮三兩甘草三兩上四味以水六升煮取三升分溫三服小便則利趙以德曰靈樞謂心胞絡之脈動則病胸脅支滿者謂痰飲積於心胞其病則必若是目眩者痰飲阻其胸中之陽不能布水精於上也茯苓治痰飲伐腎邪滲水道故用以為君桂枝通陽氣和營衛開經絡痰水得溫則行故以為臣白朮治風眩燥痰水除脹滿故以佐茯苓然中滿者勿食甘此用甘草何也蓋桂枝之辛得甘則佐其發散復益土以制水且得茯苓則不資滿而反泄滿本草曰甘草能下氣除煩滿故用之也夫短氣有微飲此水飲停蓄呼吸不利而然也金匱並出二方妙義益彰呼氣之短用苓桂朮甘湯之輕清以通其陽陽氣化則小便能出矣吸氣之短用腎氣丸之重降以通其陰腎氣通則關門自利矣呼吸二義發明極精
