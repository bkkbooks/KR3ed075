body:
  text: 卷二小半夏湯三方小半夏湯嘔家本渴渴為欲解今反不渴心下有支飲故也半夏一升生薑半斤以水七升煮取一升半分溫再服小半夏加茯苓湯治卒嘔吐心下痞悶間有水眩悸者半夏一升生薑半斤茯苓三兩煎服如前外臺茯苓飲治心胸中有痰飲宿水自吐出水復心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩橘皮二兩半生薑四兩上六味水六升煮取一升八合分三服如人行八九里再進之趙以德曰嘔為痰飲動中湧而出之嘔盡本當渴渴則可徵支飲之全去今反不渴是其飲尚留去之未盡也用半夏之辛溫生薑之辛散散其欲出之飲則所留之邪自盡矣半夏生薑皆味辛可治膈上痰心下堅嘔逆目眩然悸必心受水凌故加茯苓以去水伐腎邪安心神也後方加人參枳實橘皮此由上中二焦氣弱水飲入胃脾不能輸歸於肺肺不能通調水道以致停積為痰為宿水吐之則下氣因而上逆是為虛氣滿不能食當補益中氣以人參白朮為君茯苓逐宿水枳實調諸氣為臣開脾胃宣揚上焦發散凝滯則陳皮生薑為使也凡積飲既去而虛氣塞滿其中不能進食此症最多瀉白散治肺氣熱盛咳嗽而喘面腫身熱桑白皮地骨皮甘草水煎服季楚重曰經云肺苦氣上逆上逆則上焦鬱熱氣鬱生涎火鬱生熱因而治節不行壅甚為喘滿腫嗽瀉白者正金之令驅氣之逆非劫金而瀉之也法使金清則氣肅桑根白皮稟西方燥金之氣甘辛能入肺而瀉氣之有餘地骨皮涼平調不足之陰能清陰中之火滋腎子以清母甘草益土和中且生能瀉火補土母以食子瀉補交致金元自正於以佐桑皮而行諸氣之憤郁鮮不達矣較之黃芩知母苦寒傷胃者遠也夫火熱傷氣救肺之治有三傷寒邪熱侮肺用白虎湯除煩此治其標內症虛火爍陰用生脈散益陰此治其本若夫正氣不傷鬱火又甚則瀉白散之清肺調中標本兼治又補二方之不及也地骨皮飲治陰虛火旺骨蒸發熱日靜夜劇者婦人熱入血室胎前發熱者四物湯加地骨皮牡丹皮各三錢水煎服柯韻伯曰陰虛者陽必湊之故熱仲景曰陰弱則發熱陽氣下陷入陰中必發熱然當分三陰而治之陽邪陷入太陰脾部當補中益氣以升舉之清陽復位而火自熄也若陷入少陰腎部當六味地黃丸以對待之壯水之主而火自平也陷入厥陰肝部當地骨皮飲以涼補之血有所藏而火自安也四物湯為肝家滋陰調血之劑加地骨皮清志中之火以安腎補其母也加牡丹皮清神中之火以涼心瀉其子也二皮涼而不潤但清肝火不傷脾胃與四物加知柏之濕潤而苦寒者不同矣故逍遙散治肝火之鬱於本臟者也木鬱達之順其性也骨皮飲治陽邪之陷於肝臟也客者除之勿縱寇以遺患也二方皆肝家得力之劑升陽益胃湯治脾胃虛怠惰嗜臥四肢不收時值濕熱體重節痛口乾舌燥飲食無味大便不調小便頻數食不消兼見肺病灑淅惡寒慘慘不樂面色不和羌活獨活防風柴胡人參白朮茯苓甘草黃耆白芍半夏黃連澤瀉陳皮水煎服吳鶴皋曰脾土虛弱不能制濕故體重節痛不能運化精微故口乾無味中氣既弱傳化失宜故大便不調小便頻數也灑淅惡寒肺弱表虛也面色不樂陽氣不伸也是方半夏白朮能燥濕茯苓澤瀉滲之二活防風柴胡能升舉清陽之氣黃連療濕熱陳皮平胃氣參耆甘草以益胃白芍酸收用以和營而協羌防柴胡辛散之性蓋古人用辛散必用酸收所以防其峻厲猶兵家之節制也清脾飲治痰積成瘧青皮厚朴草果半夏柴胡白朮甘草茯苓黃芩水煎服柯韻伯曰瘧為少陽病治分六經邪留於募原有遠近之殊其發有虛實先後之異而此湯之治瘧實以痰積名之清脾者究其因而治其本也先哲云無痰不成瘧無積不成瘧是脾為生痰之源而積之不磨者亦因脾之不運也胃主內脾主消而胃為脾之表凡欲清脾必先平胃青皮厚朴草果皆氣味兼厚之品取以倒陽陰之倉正以利太陰之輸也然宿痰留結更有藉於茯苓半夏之淡滲辛散是恐奇之不去則偶之所以攻脾之實者平胃除痰每相須耳積因於寒痰因於熱是寒熱往來為瘧之標而實為痰積之本矣必用芩柴以清之更合於少陽之治然此為土中瀉火不是直攻少陽乃清脾之義也火土平而無以善其後則瘧之因實而成者未免因虛而劇甘術之必須又防微杜漸法耳溫膽湯治熱嘔吐苦虛煩驚悸不眠痰氣上逆竹茹枳實半夏甘草陳皮生薑茯苓上七味水煎服羅東逸曰膽為中正之官清淨之腑喜寧謐惡煩擾喜柔和不喜壅鬱蓋東方木德少陽溫和之氣也若大病後或久病或寒熱甫退胸膈之餘熱未盡必致傷少陽之和氣以故虛煩驚悸者中正之官以熇蒸而不寧也熱嘔吐苦者清淨之腑以郁炙而不謐也痰氣上逆者土家濕熱反乘而木不得升也如是者首當清熱及解利三焦方中以竹茹清胃脘之陽而臣以甘草生薑調胃以安其正佐以二陳下以枳實除三焦之痰壅以茯苓平滲致中焦之清氣且以驅邪且以養正三焦平而少陽平三焦正而少陽正膽家有不清寧而和者乎和即溫也溫之者實涼之也若膽家真畏寒而怯屬命門之火衰當與乙癸同源而治矣導赤散治心熱小便黃赤莖中痛熱急不通生地黃木通甘草梢上三味水煎服季楚重曰經云兩精相搏謂之神是神也者待心中之真液腎中之真氣以養者也故心液下交而火自降腎氣上承而水自生前賢以生脈救真液是治本不治標也導赤散清邪火是治標以固本也錢氏制此方意在制丙丁之火必先合乙癸之治生地黃涼而能補直入下焦培腎水之不足腎水足則心火自降尤慮肝木妄行能生火以助邪能制土以盜正佐以甘草梢下行緩木之急即以瀉心火之實且治莖中痛更用木通導小腸之滯即以通心火之郁是一治兩得者也瀉心湯用黃連所以治實邪實邪責木之有餘瀉子以清母也導赤散用地黃所以治虛邪虛邪責水之不足壯水以制火也此方涼而能補較之用苦寒伐胃傷其生氣者遠矣芍藥湯治滯下赤白便膿血後重諸證芍藥二兩當歸黃連各五錢檳榔木香甘草各二錢桂一錢半黃芩五錢每服半兩水煎服痢不減加大黃羅東逸曰本方注云溲而便膿血知氣行而血止也行血則便膿自愈調氣則後重自除至今推為要言然非知本之論也夫滯下本太陰病長夏令行土潤溽暑太陰本虛暑濕不攘土濕則木鬱木鬱則傷土太陰失健運少陽失疏達及飲食失節不化至秋金收令行火用不宣鬱蒸之久而滯下之症作矣是始為暑傷氣繼為氣傷血因而為白為赤為兼赤白下迫窘急腐穢不去以成後重方以芍草為君用甲己化土法先調脾即於土中升木顧濕熱必傷大腸黃連燥濕清熱厚腸胃黃芩清大腸火為臣久積必中氣逆滯疏滯以木香下逆以檳榔當歸和氣血為佐桂補命門實土母反佐溫而行之恐芩連之勝令也斯少陽達太陰運矣若大實痛者加大黃用仲景芍藥湯加大黃法以蕩腐穢無留行矣是方允為滯下本方也犀角地黃湯主治吐衄便血婦人血崩赤淋生犀角生地黃白芍藥牡丹皮上四味先用三物水煎去滓入生犀汁熱服柯韻伯曰氣為陽血為陰陽密乃固陽盛則傷陰矣陰平陽祕陰虛者陽必湊之矣故氣有餘即是火火入血室血不營經即隨逆氣而妄行上升者出於口鼻下陷者出於二便雖有在經在腑之分要皆心肝受熱所致也心為營血之主心火旺則血不寧故用生犀生地酸鹹甘寒之味以清君火肝為藏血之室肝火旺則血不守故用丹皮芍藥辛酸微寒之品以平相火此方雖曰清火而實滋陰之劑蓋血失則陰虛陰虛則無氣故陰不足者當補之以味勿得反傷其氣也若用芩連膽草梔柏以瀉其氣則陽之劇者苦從火化陽已衰者氣從苦發燎原而飛越矣此義不可不知人參清肺湯準繩三方合論治肺胃虛寒咳嗽喘急坐臥不安並治久年勞嗽吐血腥臭人參阿膠骨皮知母烏梅粟殼炙草杏仁桑皮等分棗子水煎服人參定喘湯準繩治肺氣上逆喘嗽喉中有聲胸膈緊痛及感寒邪咳嗽聲重人參麻黃阿膠五味粟殼甘草半夏曲各一錢桑皮二錢生薑三片水煎服人參瀉肺湯金匱治肺經積熱上喘胸膈脹滿痰多大便澀人參黃芩梔子枳殼薄荷甘草連翹杏仁桑皮大黃桔梗水煎服王又原曰經曰邪之所湊其氣必虛又肺為嬌臟其不堪破耗也明矣自肺熱傷肺之說行曰保肺補肺衆共譁之曰清肺瀉肺樂與和之豈知古人清肺瀉肺等湯而必皆以人參立名夫亦可曉然於肺氣之不可耗而人參之在所必用也肺體清而法天下濟而司降令一切渾濁不得上乾者皆氣之健能運行而不息也若肺氣少弛則降下失令渾濁之氣遂逆上行此為咳嗽為喘急肺葉脹舉胸膈緊痛移熱大腸大便艱澀種種顯有餘之象實種種為不足之徵故不問內傷外感為熱為寒要以人參保定肺氣為主或骨皮知母阿膠滋之或烏梅五味罌粟殼斂之或半夏曲生薑降之或杏仁桑皮枳殼桔梗利之或梔子黃芩連翹涼之或麻黃薄荷發之大黃下之總恃人參之大力握樞而運已入之邪易出而將來之邪無從入也肺邪得諸藥以俱出而肺氣不隨諸藥以俱出也然則人參亦何嘗傷肺乃畏而不敢用耶溫脾湯本事方主治錮冷在腸胃間泄瀉腹痛宜先取去然後調治不可畏虛以養病也厚朴乾薑甘草桂心附子各二兩大黃四錢上㕮咀取一兩水二鍾煎六分頓服喻嘉言曰許叔微制此方深合仲景以溫藥下之之法其大黃只用四錢更為有見夫痼冷在腸胃而泄瀉矣即溫藥中寧敢用大黃之猛重困之乎減而五分之一乃知叔微之得於仲景深也仲景云病人舊微溏者梔子湯不可與服又云太陰病脈弱便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也即是觀之腸胃痼冷之泄瀉而可恣用大黃耶不用則溫藥必不能下而久留之邪非攻不去多用則溫藥恐不能制而洞下之勢或至轉增裁酌用之真足法矣方妙矣議更妙秦艽升麻湯治風寒客胃口眼喎斜惡見風寒四肢拘急脈浮而緊升麻葛根秦艽上白芷上防風上甘草芍藥人參桂枝蔥白上十味水煎服李士材曰至哉坤元為五臟之主木勝風淫則倉廩之官承製脾主四肢故痿痹也口為土之外候眼為木之外候故俱病也升麻白芷皆陽明本藥故用為直入之兵人參桂枝固其衛氣芍藥秦艽和其營血防風卑賤之卒隨令而行蔥根發汗之需無微不達又藉甘草以和之而邪有不散者乎二黃湯治上焦火盛頭面大腫目赤腫痛心胸咽喉口舌耳鼻熱盛及生瘡毒者黃芩黃連甘草各等分水煎食後服柯韻伯曰諸腫痞痛皆屬心火必用芩連以瀉心然傷寒熱結於內而心下痞者是為客邪治客當急故君大黃率芩連用麻沸湯漬絞其汁而速驅之不使暫留也此熱淫於內而上炎頭目者是為正邪治之當緩故用甘草與芩連等分同煎漫飲以漸漬之不使下行也蓋心下本虛而火實之法當並瀉其子土鬱奪之而火速降矣上焦本清而火擾之法當先培其子土得其令而火邪自退矣芩連得大黃不使其子令母實芩連得甘草又不使其母令子虛同一瀉心而其中又有攻補之不同如此四磨湯濟生治七情感傷上氣喘急煩悶不食人參檳榔沉香天台烏藥上四味各濃磨水取七分煎三五沸放溫空心服或下養正丹尤妙王又原曰經云聖人嗇氣如持至寶庸人役物而反傷太和此七情隨所感皆能為病然愈於壯者之行而成於弱者之著愚者不察一遇上氣喘急滿悶不食謂是實者宜瀉輒投破耗等藥得藥非不暫快初投之而應投之久而不應矣夫呼出為陽吸入為陰肺陽氣旺則清肅下行歸於腎陰是氣有所收攝不復散而上逆若正氣既衰邪氣必盛縱欲削堅破滯邪氣必不伏方用人參補其正氣沉香納之於腎而後以檳榔烏藥從而導之所謂實必顧虛瀉必先補也四品氣味俱厚磨則取其味之全煎則取其氣之達氣味齊到效如桴鼓矣其下養正丹者暖腎藥也本方補肺氣養正溫腎氣鎮攝歸根喘急遄已矣升麻葛根湯治陽明表熱下利兼治痘疹初發升麻葛根芍藥甘草炙上四味水煎服柯韻伯曰此為陽明初病解表和里之劑可用以散表熱亦可用以治裡虛一方而兩擅其長也夫身熱汗自出不惡寒反惡熱是陽明之本證仲景未嘗立治表之方見陽明初起汗出多而惡寒者便用桂枝湯反無汗而喘者仍用麻黃湯症同太陽而稱陽明者是陽明之自病而非太陽轉屬也此方不用麻桂者恐傷肌肉之表汗太過而亡津升麻葛根提胃脘之陽散肌肉之浮熱芍藥甘草瀉肝膽之火以解胃腑之實熱有汗則發無汗則止功同桂枝而已遠於薑桂且不須啜稀粥以助陽也胃實為陽明之裡症仲景制承氣三方然陽明初病往往有移熱於脾而下利者內經所謂暴注下迫皆屬於熱也下利正是胃實之兆故太陽陽明合病必自下利仲景制葛根湯以表散之是從陰引陽法此方即仿其義去薑桂之辛熱以升麻代麻黃便是陽明表劑而非太陽表劑矣葛根稟性甘涼可以散表實協升麻以上升則使清陽達上而濁陰降下可知芍藥收斂陰精甘草緩急和里則下利自止可知治里仍用表藥者以表實下利而非裡實故也痘疹自里達表出於少陰而發於太陽初起則內外皆熱故亦宜於涼散耳防風通聖散風熱壅盛表裡三焦皆實者此方主之防風川芎當歸芍藥大黃薄荷麻黃連翹芒硝各半兩黃芩石膏桔梗各一兩滑石三兩甘草二兩荊芥白朮梔子各二錢半生薑三片每服三錢吳鶴皋曰防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由溺而泄風淫於膈肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎歸芍和肝血而甘草白朮所以和胃氣而健脾劉守真氏長於治火此方之旨詳且悉哉亦治失下發斑三焦火實全方除硝黃名曰雙解散解表有防風麻黃薄荷荊芥川芎解里用石膏滑石黃芩梔子連翹復有當歸芍藥以和血桔梗白朮甘草以調氣營衛皆和表裡俱暢故曰雙解本方名曰通聖極言其用之妙耳藿香正氣散治外受四時不正之氣內停飲食頭痛寒熱或霍亂吐泄或作瘧疾藿香桔梗紫蘇白芷厚朴大腹皮半夏茯苓陳皮甘草上十味加薑棗水煎熱服吳鶴皋曰四時不正之氣由鼻而入不在表而在裡故不用大汗以解表但用芬香利氣之品主之蘇芷陳腹朴梗皆氣勝者也故足正不正之氣茯半甘草則甘平之品所以培養中氣者也若病在太陽與此湯全無相干傷寒脈沉發熱與元氣本虛之人並夾陰發熱者宜戒又金不換正氣散即平胃散加半夏藿香凡受山嵐瘴氣及出遠方不服水土吐瀉下利者主之蓋平胃散可以平濕土而消瘴半夏之燥以醒脾藿香之芬以開胃名曰正氣謂能正不正之氣耳防風黃耆湯治中風不能言脈沉而弱者防風黃耆等分水煎服柯韻伯曰夫風者百病之長也邪風之至急如風雨善治者治皮毛故用防風以驅逐表邪邪之所湊其氣必虛故用黃耆以鼓舞正氣黃耆得防風其功愈大者一攻一補相須相得之義也唐柳太后中風不言許胤宗造防風黃耆湯數十斛置床下蒸之身在氣中居次日便能語是以外氣通內氣令氣行而愈也經曰五氣入鼻藏於心肺上使耳目修明聲音能彰制此方者其知此義矣夫熏蒸之力尚能去病況服之乎今人治風惟以發散為定法而禁用參耆豈知目盲不能視口噤不能言皆元氣不足使然耳誰知補氣可以御風正勝而邪卻之理耶神而明之存乎其人信哉稀涎千緡湯治風痰不下喉中聲如牽鋸或中濕腫滿半夏大者十四枚豬牙皂角一挺炙甘草一錢白礬二錢上四味研末用生薑自然汁少許沖溫水一盞調末一錢灌之得吐痰涎即醒柯韻伯曰攻邪有汗吐下三法仲景於吐劑立梔豉瓜蒂二方所以導熱邪之外出逐寒邪而外散也其有不因外感因醇酒厚味漸漬凝結變為頑痰一旦乘虛上塞咽喉氣不得通忽然昏僕目反直視喉中聲如牽鋸此為痰厥先輩所云怪症多屬於痰者此也非用峻劑以攻之頑痰不能遽退故用生薑半夏之辛以散之甘草之甘以湧之白礬之澀以墜之牙皂之勇以開之此斬關奪門之勢惟稟氣素實而暫虛者可用壅塞稍疏續進他藥不可多用以傷元氣如平素虛弱者又當攻補兼施六君湯中加牙皂白礬末以吐之則庶幾矣若誤作中風治之去生便遠麥門冬湯金匱火逆上氣咽喉不利止逆下氣者主之麥門冬七升半夏一升人參三兩甘草二兩粳米三合大棗十二枚上六味以水一二斗煮取六升溫服一升日三夜一服喻嘉言曰此方治胃中津液乾枯虛火上炎治本之良法也夫用降火之藥而火反升用寒涼之藥而熱轉熾者徒知與火熱相爭而正氣不致津液不生不惟無益而反害之矣凡肺病有胃氣則生無胃氣則死胃氣者肺之母氣也本草有知母之名者謂肺藉其清涼知清涼為肺之母也有貝母之名者謂肺藉其豁痰豁痰為肺之母也然屢施於火逆上氣咽喉不利之症而屢不應名不稱矣孰知仲景妙法於麥冬人參甘草大棗粳米大補中氣以生津液津液隊中又增入半夏辛溫之味以開胃行津而助潤肺豈特用其利咽下氣哉顧其利咽下氣非半夏之功實善用半夏之功矣九味羌活湯活人敗毒散合論九味羌活湯九味羌活湯一名沖和湯四時發散之通劑合論一條羌活防風川芎白芷細辛蒼朮黃芩甘草生地加生薑三片蔥白三莖水煎服活人敗毒散羌活獨活前胡柴胡川芎枳殼白茯苓桔梗人參各一兩甘草五錢上為細末每服二錢水一盞入生薑三片煎七分溫服或沸湯點服治傷寒溫疫風濕風眩拘蜷風痰頭疼目眩四肢痛憎寒壯熱項強睛疼老人小兒皆可服煩熱口乾加黃芩趙羽皇曰東南地土卑濕凡患感冒輒以傷寒二字混稱不知傷者正氣傷於中寒者寒邪客於外未有外感而內不傷者也仲景醫門之聖立法高出千古其言冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒以失於固密而然可見人之傷寒悉由元氣不固而膚腠之不密也昔人常言傷寒為汗病則汗法其首重矣然汗之發也其出自陽其源自陰故陽氣虛則營衛不和而汗不能作陰氣弱則津液枯涸而汗不能滋但攻其外不顧其內可乎表汗無如敗毒散羌活湯其藥如二活二胡芎蒼辛芷群隊辛溫非不發散若無人參生地之大力者居乎其中則形氣素虛者必至亡陽血虛挾熱者必至亡陰而成痼疾矣是敗毒散之人參與沖和湯之生地人謂其補益之法我知其托裡之法蓋補中兼發邪氣不致於流連發中帶補真元不至於耗散此古人制方之妙也胡天錫曰非其時而有其氣惟氣血兩虛之人受之寒客營而風客衛不可用竣劑故稍從其輕者此羌活湯敗毒散所由立也九味湯主寒邪傷營故於發表之中加芎地引而入血即藉以調營用蔥姜為引使通體汗出庶三陽血分之邪直達而無所滯矣敗毒散主風邪傷衛故於發表中加參苓枳桔引而達衛以宣通固托生薑為使使流連肺部則上焦氣分之邪不能幹矣是方亦可用黃芩以諸藥氣味辛溫恐其僭亢一以潤之一以清之也神術湯主治三時外感寒邪內傷生冷而發熱及脾泄腸風白朮三錢防風二錢甘草一錢上三味無汗用蒼朮加蔥白生薑有汗用白朮生薑柯韻伯曰此王海藏得意之方仿仲景麻桂二方之義而製為輕劑也然此是太陰之劑可以理脾胃之風濕而不可治太陽之風寒亦不可以治陽明之表症與少陽之半表裡也內經所謂春傷於風邪氣留連而洞泄至夏而飧泄腸澼者宜之若冬傷於寒至春病溫者又非所宜也今人不知仲景立方之旨只恐麻黃桂枝之傷人也得此平和之劑恃為穩當不知營衛不和非調和脾胃者所可代胃家之實者非補虛之品所能投肝膽之相火往來少陰之水火相射者不得以燥劑該攝也先明藥之理始得方之用能知方始可用方而不執方若病在太陽先發陽明之汗是引賊破家易老豈獨為葛根道哉三生飲治卒中昏不知人口眼喎斜半身不遂並痰厥氣厥南星一兩生用川烏去皮生用五錢附子去皮生用五錢木香二錢上每服五錢薑水煎加人參一兩柯韻伯曰風為陽邪風中無寒不甚傷人惟風中挾寒害始劇矣寒輕而在表者宜發汗以逐邪寒重而入里者非溫中補虛終不可救此取三物之大辛大熱者且不炮不制更佐以木香乘其至剛至鋭之氣而用之非以治風實以治寒也然邪之所湊其氣必虛但知勇於攻邪若正氣虛而不支能無倒戈之患乎必用人參兩許以駕馭其邪此立齊先生真知確見立於不敗之地而收萬全之效者也若在庸手必謂補住邪氣而不敢用此謹熟陰陽毋與衆謀岐伯所以叮嚀致告耳此方人參必不可廢不是孟浪觀其每服五錢必四服而邪始出今之畏事者用烏附分數必制熟而後敢用更以芩連監製之焉能挽回如此之危症哉古今人不相及如此本方去烏附即星香散治痰厥氣厥足矣仙方活命飲附薛立齊治瘍通方治一切瘡瘍未成膿者內消已成膿者即潰又止痛消毒之聖藥也穿山甲白芷防風皂角刺乳香沒藥當歸尾赤芍花粉貝母陳皮甘草金銀花上十三味用酒一碗煎數沸服羅東逸曰此瘍門開手攻毒之第一方也經云營氣不從逆於肉理故癰疽之發未有不從營氣之鬱滯因而血結痰滯蘊崇熱毒為患治之之法妙在通經之結行血之滯佐之以豁痰理氣解毒是方穿山甲以攻堅皂刺必達毒所白芷防風陳皮通經理氣而疏其滯乳香定痛和血沒藥破血散結赤芍歸尾以驅血熱而行之以破其結佐以貝母花粉金銀花甘草一以豁痰解鬱一以散毒和血其為潰堅止痛宜矣然是方為營衛尚強中氣不虧者設若脾胃素弱營衛不調則有托裡消毒散之法必須斟酌而用見之立齊先生所論此千古不易之治也因謹附先生治瘍用方之法於後使後學服膺云薛立齊曰治瘍之法若腫高焮痛者先用仙方活命飲解之後用托裡消毒散漫腫微痛者用托裡散如不應加薑桂若膿出而反痛氣血虛也八珍散不作膿不腐潰陽氣虛也四君加歸耆肉桂不生肌不收斂脾氣虛也四君加芍藥木香惡寒憎寒陽氣虛也十全大補加薑桂晡熱內熱陰血虛也四物加參術欲嘔作嘔胃氣虛也六君加炮姜自汗盜汗五臟虛也六味丸料加五味子食少體倦脾氣虛也補中益氣加茯苓半夏喘促咳嗽脾肺虛也前湯加麥冬五味欲嘔少食脾胃虛也人參理中湯腹痛泄瀉脾胃虛寒也附子理中湯熱渴淋祕腎虛陰火也加減八味丸大凡怯弱之人不必分其腫潰惟當先補胃氣蓋瘡瘍之作緣陰陽虧損其膿既泄氣血愈虛豈有不宜補者哉或疑參耆滿中間有用者又加發散敗毒所補不償所損又或以有疾不服補劑因而致誤傷哉附托裡消毒散人參黃耆白朮茯苓當歸川芎芍藥金銀花白芷甘草連翹水煎服參耆朮苓草以益氣分歸芎芍以滋血分銀花白芷連翹以解毒托裡散即前方加熟地去芎甘銀花白芷連翹麻黃加朮桂枝加附湯麻黃加朮湯治濕家自煩疼麻黃三兩桂枝二兩甘草二兩炙杏仁七十個白朮四兩炒上五味以水九升煮麻黃減二升去沫納諸藥煮取二升半去滓溫服八合復取微似汗程扶生曰此湯為濕家表散法也身疼為濕身煩為熱加白朮於麻黃湯中一以助其去濕一以恐其過散此治濕之正法也發散方中加白朮又為潔古海藏開鬼門法桂枝加附湯主治傷寒八九日風濕相搏身體煩疼不能轉側不嘔不渴脈浮虛而澀者桂枝四兩附子三枚炮甘草二兩生薑三兩大棗十二枚上五味以六升水煮取二升去渣分溫三服程扶生曰濕與風相搏流入關節身疼極重而無頭痛嘔渴等症脈浮虛者風也澀者寒濕也風在表者散以桂枝甘草之辛甘濕在經者逐以附子之辛熱薑棗辛甘行營衛通津液以和表蓋陽虛則濕不行溫經助陽散濕多藉附子之大力也木防己湯四方合論木防己湯木防己三兩石膏用雞子大十二枚桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防去石膏加茯苓芒硝湯木防己桂枝各二兩人參四兩芒硝三兩茯苓四兩上五味以水六升煮取三升去滓後納芒硝再微煎分溫再服微利則愈葶藶大棗瀉肺湯本方治肺癰喘不得臥並治支飲不得息葶藶熬令黃色搗如彈子大大棗十二枚上二味以水三升煮棗取二升去滓納葶藶煮取一升頓服防己椒目葶藶大黃丸治腹滿口舌乾燥此腸門有水氣防己椒目葶藶熬大黃各一兩上為末蜜丸如桐子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩喻嘉言曰四方皆治支飲上入膈中而有淺深次第之分首二方先治其肺中一方專治其肺後一方專治肺氣所傳之腑蓋支飲上入於膈逼近心肺奧援腎邪本文云其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復不愈者去石膏加芒硝茯苓蓋以支飲上入阻其氣則逆於肺間而為喘滿阻其血則雜揉心下而為痞堅腎氣上應其色黑血凝之色亦黑故黧黑見於面部然且姑緩心腎之治先治其肺肺之氣行則飲不能逆而俱解矣木防己味辛溫能散留飲結氣又主肺喘滿石膏辛甘微寒主心下逆氣清肺定喘人參甘溫治喘消膈飲補心肺不足桂枝辛熱通血脈開結氣宣導諸藥在氣分服之即愈若飲在血分深連下焦必愈而復發故去石膏氣分之藥加芒硝入陰分開痰結消血癖合之茯苓去心下堅且伐腎邪也葶藶大棗湯大瀉其肺氣亦以氣停故液聚耳防己椒目葶藶大黃丸治腹滿口舌乾燥腸間有水氣之症乃肺氣憤鬱於上以致水飲不行於下而燥熱之甚用此丸急通水道以救金氣之憤郁不治上而治其下故用丸劑也羅東逸曰此三方金匱衍義趙以德注之已詳而喻嘉言合而注之青出於藍故棄趙而取喻耳大黃附子湯主治脅下偏痛發熱其脈緊弦此寒也以溫藥下之大黃二兩附子二枚炮細辛二兩上三味以水五升煮取二升分溫三服若強人取二升半分三服服後如人行四五里再進喻嘉言曰仲景治傷寒熱邪痞聚心下而挾陽虛陰盛之症用附子瀉心湯之法矣其雜症脅下偏痛發熱為陽其脈弦緊為陰寒上逆者復立此溫藥下之一法然仲景諄諄傳心後世領略者鮮金匱又別出一條云其脈數而緊乃弦狀如弓弦按之不移數脈弦者當下其寒脈緊而遲者必心下堅脈大而緊者陽中有陰可下之讀者罔識其指詎知皆以溫藥下之之法耶其曰當下其寒曰陽中有陰試一提出其金針不躍然乎張路玉曰三承氣湯為寒下之柔劑白散備急丸為熱下之剛劑附子瀉心湯大黃附子湯為寒熱互結剛柔並濟之和劑近世但知寒下一途絶不知有溫下一法蓋暴感之熱結可以寒下久結之寒結亦可寒下乎是以備急無法所由設也然此僅可治寒實之結設其人稟質素虛雖有實邪固結敢用剛猛峻劑攻擊之乎故仲景又立附子瀉心湯用芩連佐大黃以祛膈上之熱痞即兼附子之溫以散之大黃附子湯用細辛佐附子以攻脅下寒結即兼大黃之寒導而下之發明得妙此聖法昭然不可思議者也續命湯金匱治中風痱身體不能自收持口不能言冒昧不知痛處或拘急不得轉側麻黃桂枝石膏乾薑杏仁四十枚川芎當歸人參甘草各三兩上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風並治脈伏不得臥咳逆上氣面目浮腫趙以德曰痱病者營衛氣血不養於內外故身體不用機關不利精神不治然是症有虛有實虛者自飲食房勞七情得之如內經所謂內奪而厥則為喑痱之類是也實者自風寒暑濕感之虛者不可以實治治之則愈散其氣血今此方明言其中風痹其營衛之屬實邪者也故用續命續命乃麻黃湯之變者加乾薑開血受寒痹石膏解肌受風痹當歸和血人參益氣川芎行血散風也其並治咳逆上氣面浮亦為風寒而致之也分疏明晰深為用方者採擇無誤栝蔞桂枝湯治太陽症備身體強𠘧𠘧然脈反沉遲此為痙此湯主之栝蔞根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫三服取微汗汗不出食頃須啜熱粥發之喻嘉言曰傷寒方中治項背𠘧𠘧用桂枝加葛根湯矣彼之汗出惡風其邪在表而此之太陽症罔不具備其邪之亦在於表可知也但以脈之沉遲知其在表之邪為內濕所持而不解即系濕熱二邪交合不當從風寒之表法起見故不用葛根之發汗解肌改用栝蔞之味苦入陰擅生津徹熱之長者為君合之桂枝和營衛養筋脈而治其痙乃變表法為和法也越婢加半夏小青龍加石膏湯越婢加半夏湯治咳而上氣此為肺張其人喘目如脫狀脈浮大者麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半斤上六味以水六升先煮麻黃去沫納藥取三升分溫三服小青龍加石膏湯治肺脹咳而上氣煩躁而喘脈浮者心下有水麻黃桂枝細辛芍藥甘草各三兩五味子半斤乾薑三兩半夏半斤石膏三兩上九味以水一斗煮麻黃去沫納諸藥取三升強人服一升羸者減之日三服小兒服四合喻嘉言曰前一方麻黃湯中以杏仁易石膏而加薑棗則發散之力微而且緩後一方中以證兼煩躁宜發其汗麻桂藥中加入石膏芍藥五味子其勢下趨亦不至過汗也越婢方中有石膏無半夏小青龍方中有半夏無石膏觀二方所加之意全重石膏半夏二物協力建功石膏清熱藉辛熱亦能豁痰半夏豁痰藉辛涼亦能清熱前麥冬湯方中下氣止逆全藉半夏入生津藥中此二方又藉半夏入清熱藥中仲景加減成方無非化裁後學矣桂枝湯治風寒在表脈浮弱自汗出頭痛發熱惡風惡寒鼻鳴乾嘔等症雜症自汗盜汗虛瘧虛痢最宜若脈浮緊汗不出者禁用酒客病風寒而汗出者亦不可與之桂枝芍藥生薑各三兩甘草炙二兩大棗十二枚上五味以水七升煮取三升服一升覆令微汗不可令如水流漓病必不除若服一升汗出病痊不必盡劑服已更啜稀粥一盞以助藥力柯韻伯曰此方為仲景群方之冠乃滋陰和陽解肌發汗調和營衛之第一方也凡中風傷寒雜症脈浮弱汗自出而表不解者鹹得而主之其他但見一二症即是不必悉具矣桂枝赤色通心溫能散寒甘能益氣生血辛能發散外邪內輔君主發陽氣而為汗故麻葛青龍凡發汗劑咸用之惟桂枝湯可不用麻黃而麻黃湯不可無桂枝也桂枝義盡本方皆辛甘發散惟芍藥之酸寒益陰斂血內和營氣故能止汗先輩言無汗不得用桂枝者正以中有芍藥能止汗也芍藥之功在於止煩煩止汗亦止故反煩更煩與心悸而煩者咸賴之若倍加芍藥即建中之劑而非復發汗之劑矣發芍藥妙義無人能到是劑也用桂枝發汗芍藥止汗生薑之辛佐桂枝以解肌大棗之甘佐芍藥以和里桂芍之相須薑棗之相得陽表陰里並行不悖是剛柔相濟以為和也甘草甘平有安內攘外之能用以調和氣血者即以調和表裡且以調和諸藥矣而精義又在啜稀熱粥以助藥力蓋穀氣內充則邪不復入而啜粥以繼藥之後則餘邪不復留復方之妙用又如此要知此方專治表虛能解肌以發營中之汗而不能開皮毛之竅以出衛分之邪故汗不出者是麻黃症脈浮緊者是麻黃脈即不得與桂枝湯矣此明不用桂枝之故然初起無汗當用麻黃髮汗如汗解後復煩即脈浮數者不得更與麻黃而用桂枝如下後脈仍浮氣上衝與下利止而身痛不休者皆用此解外何故蓋此時表雖不解腠理已疏邪不在皮毛而在肌肉故脈證雖同麻黃而主治當屬桂枝也此明必用桂枝之故粗工妄謂桂枝湯專治中風不治傷寒使人疑而不用不知此湯以治自汗盜汗虛瘧虛痢隨手而愈因知仲景方可通治百病後人遇一症便集百方以眩人使人無下手處豈不陋哉麻黃湯太陽風寒在表頭項強痛發熱身疼腰痛骨節痛惡風寒無汗胸滿而喘其脈浮緊或浮數者用此發汗如若脈浮而弱汗自出或尺中脈微與遲者俱不可用風寒濕成痹冷風哮最宜麻黃三兩去節桂枝二兩甘草一兩炙杏仁七十枚去皮尖上四味用水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合取微似汗不須啜粥一服汗出停後服汗出多者溫粉撲之恐汗多亡陽也柯韻伯曰此為開表逐邪發汗之峻劑也麻黃中空外直宛如毛竅骨節能驅骨節之風寒悉從毛竅而出為衛分發散風寒之第一品桂枝支條縱橫宛如經別孫絡能入心化液通經絡而出汗為營分解散風寒之第一品杏仁為心果溫能助心散寒苦能入心下氣為逐邪定喘之第一品甘草甘平外拒風寒內和氣血為安內攘外之第一品飲入於胃行氣於玄府輸精於皮毛斯毛脈合精而溱溱汗出在表之邪得盡去而不留痛止喘平寒熱頓解不須啜粥而藉汗於谷也其不用薑棗者以生薑之性橫散於肌礙麻黃之汛升大棗之性泥滯於膈礙杏仁之速降此欲急於直達稍緩則不汛橫散則不峻矣然此為純陽之劑過於發散如單刀直入之將用此卻當一戰成功不去則不戢而召禍故可一不可再如汗後不解便當以桂枝湯代之若猶流連於皮毛又有桂麻各半麻黃一桂枝二之妙用若陽盛於內而無汗者又有麻黃杏仁甘草石膏湯此仲景用方之心法也葛根湯主治頭項強痛背亦強牽引𠘧𠘧然脈浮無汗惡風並治風寒在表而自下利葛根二兩麻黃三兩桂枝二兩生薑三兩芍藥二兩甘草一兩大棗十二枚上七味以水一斗先煮麻黃葛根減二升去沫納諸藥同煎分溫三服柯韻伯曰此症身不疼腰不痛骨節不疼不惡寒是骨不受寒矣頭項強痛下連於背牽動不寧是筋傷於風矣不喘不煩躁不幹嘔是無內症無汗而惡風病只在表若表病而兼下利是表實裡虛矣比麻黃青龍二症較輕然𠘧𠘧更甚於項強而無汗不失為表實但脈浮不緊是中於鼓動之陽風故於桂枝方加麻黃倍葛根以去實小變麻桂之法也葛根味甘氣涼能起陰氣而作汗開腠理而解表故以為君寒熱俱輕桂芍俱減麻黃助桂姜以開表大棗助甘芍以調內故用以治表實而表邪自解不必治裡虛而下利自瘳與大青龍治表裡俱實者徑庭矣蓋葛根稟氣輕清而賦體厚重輕以去實重以鎮動厚以固里惟表實裡虛者宜之胃家實者非所宜也故仲景於陽明經中不用葛根東垣定為陽明經藥易老云未入陽明者不可便服豈二老未讀仲景書乎要知葛根桂枝俱是解肌和里之劑故有汗無汗下利不下利俱可用與麻黃之專於發表者不同耳金匱治太陽病無汗小便反少氣上衝胸口噤不得語欲作剛痙喻嘉言曰傷寒項背𠘧𠘧無汗惡風者用葛根湯此症亦用之者以其邪在太陽陽明兩經之界兩經之熱並於胸中必傷肺金清肅之氣故水道不行而小便少津液不布而無汗陽明之筋內結胃口外行胸中過人迎環口熱並陽明斯筋脈牽引口噤不得語然剛痙無汗必從汗解況濕邪內郁必以汗出如故而止故用此湯合解兩經之濕熱與風寒之表法無害其同也大青龍湯治頭項強痛脈浮緊發熱惡寒身疼痛不汗出而煩躁無少陰症者用此發汗若脈浮弱自汗出者不可服服之必厥逆筋惕肉振也麻黃六兩桂枝二兩甘草二兩杏仁四十枚生薑三兩大棗十枚石膏如雞子大一枚上七味水煎服如麻黃湯法柯韻伯曰此麻黃症之劇者故於麻黃湯加味以治之也諸症全是麻黃而喘與煩躁有別喘者是寒鬱其氣升降不得自如故多用杏仁之苦以泄氣煩躁者是熱傷其氣無津不能作汗故特加石膏之甘以生津然其性沉而大寒恐內熱頓除而表邪不解變為寒中而協熱下利故必倍麻黃以發表又倍甘草以和中更用薑棗以調營衛一汗而表裡雙解風熱兩除此清內攘外之功所以佐麻桂二方之不及也少陰亦有發熱惡寒無汗煩躁之症與大青龍同但脈不浮頭不痛為辨法當溫補及脈浮弱自汗出者是桂枝症反與麻黃石膏則真陽立亡矣胃氣不至於四肢故手足厥冷太陽不周於一身故筋惕肉瞤仲景所深戒也必細審其所不可用然後不失其所當用耳要知麻黃症熱全在表桂枝症之自汗大青龍之煩躁皆兼裡熱仲景於表劑中便加寒藥以清裡自汗是煩之兆躁是煩之徵汗出則煩得泄故不躁宜微寒酸苦之味以和之汗不出則煩不得泄故躁宜大寒堅重之品以清之芍與膏本是里藥今人見仲景入表劑中因疑而畏之當用不用以至熱結陽明而斑黃狂亂紛出矣仲景於太陽經中即用石膏以清胃火是預保陽明之先著加薑棗以培中氣又慮夫轉屬太陰苦心良法有如此者小青龍湯治傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者及雜病膚脹水腫症用此發汗而利水桂枝芍藥甘草麻黃細辛乾薑各三兩半夏五味子各半升上八味先煮麻黃去沫納諸藥煮取三升溫服一升若渴去半夏加栝蔞根三兩若微利去麻黃加芫花若噎者去麻黃加附子若小便不利少腹滿者去麻黃加茯苓四兩若喘者去麻黃加杏仁半升柯韻伯曰寒熱不解而咳知內有水氣射肺乾嘔知水氣未入於胃而在心下也心下為火位水火相射則水氣變幻不可拘如下而不上則或渴或利上而不下則或噎或喘留於腸胃則小便不利而少腹因滿矣惟發熱而咳為定證故於桂枝方去大棗之泥加麻黃以開腠理細辛逐水氣半夏除嘔五味乾薑以除咳若渴者是心火盛故去半夏之燥熱加栝蔞根以生津若微利與噎小便不利與喘者病機偏於向里故去麻黃之發表加附子以除噎芫花茯苓以利水杏仁以定喘耳兩青龍俱治有表裡證皆用兩解法大青龍是裡熱小青龍是裡寒故發表之藥相同而治里之藥則殊也此與五苓同為治表不解而心下有水氣在五苓治水之蓄而不行故大利其水而微發其汗是水鬱折之也本方治水之動而不居故備舉辛溫以散水並用酸苦以安肺培其化源也細譯仲景發表利水諸法精義入神矣趙以德曰溢飲之證金匱云當發其汗小青龍湯治之蓋水飲溢出於表營衛盡為之不利必仿傷寒營衛兩傷之法發汗以散其水而後營衛行經脈通則四肢之水亦消必以小青龍為第一義也桂枝人參葛根黃芩黃連湯太陽外證未解而數下之遂協熱而利利下不止表裡不解脈微弱心下痞硬者桂枝人參湯主之桂枝證醫反下之利遂不止其脈促喘而汗出者葛根黃芩黃連湯主之桂枝人參湯桂枝甘草各四兩人參白朮乾薑各三兩水九升先煮四味取五升納桂更煮三升日再服夜一服葛根黃芩黃連湯葛根半斤黃連黃芩各三兩甘草炙二兩水八升先煮葛根減二升納諸藥煮二升分溫再服柯韻伯曰外熱不除是表不解下利不止是里不解病因則同一以微弱之脈而心痞硬是脈不足而證有餘一以脈促而喘反汗自出是脈有餘而證不足表裡虛實當從脈而辨證矣弱脈見於數下後則痞硬為虛方用理中之辛甘溫補止利消痞硬又加桂枝以解表先煎四味後納桂枝和中之力饒而解肌之氣鋭是於兩解中寓權宜法桂枝證脈本緩誤下後而反促陽氣重可知邪束於表陽擾於內故喘而汗出利遂不止者是暴注下迫屬於熱也故君以氣輕質重之葛根解肌而止利佐以苦寒清肅之芩連止汗而除喘又加甘草以和中先煮葛根後納諸藥解肌之力緩而清中之氣鋭又與補中逐邪者殊法矣上條脈證是陽虛雖協熱於外而里則虛寒下條脈證是陽盛雖下利不止而表裡俱實同一協熱利同是表裡不解而寒熱虛實攻補不同前方理中加桂枝而冠桂枝於人參之上後方瀉心加葛根而冠葛根於芩連之首不名理中瀉心者總為表未解故耳補中亦能解表涼中亦能散表補中亦能散痞涼中亦能止利仲景制兩解方神化如此
