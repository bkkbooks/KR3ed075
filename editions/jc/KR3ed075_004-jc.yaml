body:
  text: 卷四濟生腎氣丸治腎虛脾弱腰重腳腫小便不利腹脹喘急痰盛已成鼓症其效如神熟地黃四兩白茯苓三兩牡丹皮乾山藥澤瀉車前子山茱萸牛膝肉桂各一兩附子五錢上十味蜜和丸每服八十丸空心米飲下張景岳曰水腫乃脾肺腎三臟之病蓋水為至陰故其本在腎水化於氣故其標在肺水惟畏土故其制在脾肺虛則氣不化精而化水脾虛則土不制水而水泛腎虛則水無所主而妄行以致肌肉浮腫氣息喘急病標上及脾肺病本皆歸於腎蓋腎為胃之關關不利故聚水而不能出也膀胱之津由氣化而出氣者陽也陽旺則氣化而水即為精陽衰則氣不化而精即為水水不能化因氣之虛豈非陰中無陽乎故治腫者必先治水治水者必先治氣若氣不能化水道所以不通先天元氣虧於下則後天胃氣失其本由脾及肺治節不行此下為胕腫腹大上為喘呼不得臥而標本俱病也惟下焦之真氣得行始能傳化真水得位始能分清必峻補命門使氣復其元則五臟皆安矣故用地黃山藥丹皮以養陰中之真水山茱桂附以化陰中之陽茯苓澤瀉車前牛膝以利陰中之滯能使氣化於精即所以治肺也補火生上即所以治脾也壯水利竅即所以治腎也補而不滯利而不伐治水諸方更無有出其右者然當因此擴充隨症加減若其人因大病之後脾氣大虛而病水脹者服此雖無所礙終不見效余熟計之元氣大傷而藥兼滲利未免減去補力元氣不復病必不除遂悉去利水之劑專用參朮桂附三大劑而足脛漸消十餘劑而腹脹退此後凡治中年之後脾腎皆虛者悉用此法蓋氣虛者不可復行氣腎虛者不可複利水溫補即所以化氣塞因塞用之妙顧在用之者何如耳古法治腫不用補劑而用去水等藥微則分利甚則推逐如五苓散五淋散五皮散導水茯苓湯之類皆所以利水也如舟車神祐丸浚川散禹功散十棗湯之類皆所以逐水也但察其果系實邪則此等治法仍不可廢然溫補即所以化氣氣化而愈者出自天然消伐所以逐邪逐邪而頓愈者由於勉強今工所用悉皆此類早服晚通去水斗許腫脹頓消索謝而去不顧人之虛實不慮人之生死不數日而復脹百無一生可勝道哉八味地黃丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實或下元衰憊臍腹疼痛夜多旋溺等症熟地黃八兩用真生懷慶洗浸一宿柳木甑砂鍋上蒸半日曬乾如式九次為度臨用搗膏乾山藥四兩山茱萸四兩牡丹皮白茯苓澤瀉各三兩肉桂附子各一兩上八味為末煉蜜丸如桐子大酒下十五丸日再服趙養葵曰君子觀象於坎而知腎中具水火之用今人入房而陽氣易舉者陰虛火動也陽事先痿者命門火衰也真水竭則隆冬不寒真火熄則盛夏不熱是方也熟地山藥澤瀉丹皮茯苓山萸皆濡潤之品所以能壯水之主肉桂附子辛潤之物能於水中補火所以能益火之原水火得其養則腎氣復矣喻嘉言曰金匱用八味丸治腳氣上入少腹不仁者腳氣即陰氣少腹不仁即攻心之漸故用之以驅逐陰邪也其虛勞腰痛少腹拘急小便不利則因過勞其腎陰氣逆於少腹阻遏膀胱之氣化小便不能通利故用之以收腎氣也其短氣有微飲者飲亦陰類阻其胸中之陽自致短氣故用之引飲下出以安胸中也消渴病飲水一斗小便亦一斗此腎氣不能攝水小便恣出源泉有立竭之勢故急用以逆折其水也夫腎水下趨之消腎氣不上升之渴非用此以蟄護封藏蒸動水氣舍此曷從治哉後人謂八味丸為治消渴之聖藥得其旨矣柯韻伯曰命門之火乃水中之陽夫水體本靜而川流不息者氣之動火之用也非指有形者言也然火少則生氣火壯則食氣故火不可亢亦不可衰所云火生土者即腎家之少火遊行其間以息相吹耳若命門火衰少火幾於熄矣欲暖脾胃之陽必先溫命門之火此腎氣丸納桂附於滋陰劑中是藏心於淵美厥靈根也命門有火則腎有生氣矣故不曰溫腎而名腎氣斯知腎以氣為主腎得氣而土自生也且形不足者溫之以氣則脾胃因虛寒而致病者痼痊即虛火不歸其部而失血亡陽者亦納氣而歸封蟄之本矣崔氏加減八味丸以五味之酸收易附子之辛熱腎虛而不甚寒者宜之也千金方於八味外更加玄參之鹹寒以助熟地而滋腎加芍藥之酸寒助丹皮以滋肝總之為桂附加瑣耳以之壯水則有餘以之益陽恐不足也濟生方加牛膝車前以治水腫倍茯苓以輔地黃山藥茱萸與澤丹車牛等列隨證加減允為得法益陰腎氣丸於六味外加當歸五味柴胡以治目暗不見化裁之妙矣六味地黃丸主治腎精不足虛火炎上腰膝痿軟骨熱痠疼足跟痛小便淋秘或不禁遺精夢泄水泛為痰自汗盜汗亡血消渴頭目眩暈耳聾齒搖尺脈虛大者熟地黃八兩山茱萸四兩白茯苓乾山藥各四兩牡丹皮三兩澤瀉二兩上為末煉蜜丸如桐子大空心淡鹽湯下柯韻伯曰腎虛不能藏精坎宮之火無所附而妄行下無以奉春生之令上絕肺金之化源地黃稟甘寒之性制熟味更厚是精不足者補之以味也用以大滋腎陰填精補髓壯水之主以澤瀉為使世或惡其瀉腎而去之不知一陰一陽者天地之道一開一闔者動靜之機精者屬癸陰水也靜而不走為腎之體溺者屬壬陽水也動而不居為腎之用精識精論是以腎主五液若陰水不守則真水不足陽水不流則邪水逆行故君地黃以護封蟄之本即佐澤瀉以疏水道之滯也然腎虛不補其母不導其上源亦無以固封蟄之用山藥涼補以培癸水之上源茯苓淡滲以導壬水之上源加以茱萸之酸溫藉以收少陽之火以滋厥陰之液丹皮辛寒以清少陰之火還以奉少陽之氣也滋化源奉生氣天癸居其所矣壯水制火制其一端耳天王補心丹主治心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等症人參酸棗仁當歸生地黃柏子仁麥冬天冬遠志五味子白茯苓丹參玄參桔梗上為末煉蜜丸如椒目大白湯下柯韻伯曰心者主火而所以二者神也神衰則火為患故補心者必清其火而神始安補心丹用生地黃為君者取其下足少陰以滋水主水盛可以伏火此非補心之陽補心之神耳凡果核之有仁猶心之有神也清氣無如柏子仁補血無如酸棗仁其神存耳參苓之甘以補心氣五味之酸以收心氣二冬之寒以清氣分之火心氣和而神自歸矣當歸之甘以生心血玄參之咸以補心血丹參之寒以清血中之火心血足而神自藏矣更假桔梗為舟楫遠志為嚮導和諸藥入心而安神明以此養生則壽何有健忘怔忡津液乾涸舌上生瘡大便不利之虞哉硃砂安神丸東垣方治心神昏亂驚悸怔忡寤寐不安硃砂另研黃連各半兩生地黃三錢當歸甘草各二錢上為細末酒泡蒸餅丸如麻子大硃砂為衣每服三十丸臥時津液下葉仲堅曰經曰神氣舍心精神畢具又曰心者生之本神之舍也且心為君主之官主不明則精氣亂神太勞則魂魄散所以寤寐不安淫邪發夢輕則驚悸怔忡重則癡妄癲狂耳硃砂具光明之體赤色通心重能鎮怯寒能勝熱甘以生津抑陰火之浮游以養上焦之元氣為安神之第一品心苦熱配黃連之苦寒瀉心熱也更佐甘草之甘以瀉之心主血用當歸之甘溫歸心血也更佐地黃之寒以補之心血足則肝得所藏而魂自安心熱解則肺得其職而形自正也枳朮丸東垣治胃虛濕熱飲食壅滯心下痞悶白朮二兩土蒸枳實一兩麩炒上為細末荷葉煨陳米飯為丸如椒目大白湯下東垣曰白朮苦甘溫其苦味除胃中之濕熱其甘溫補脾家之元氣多於枳實一倍枳實味苦溫泄心下痞悶消胃中所傷此藥下胃所傷不能即去須一二時許食乃消化先補虛而後化所傷則不峻利矣荷葉狀如仰盂於卦為震正少陽肝膽之氣飲食入胃營氣上行即此氣也取之以生胃氣更以煨飯和藥與術協力滋養穀氣而補脾胃其力大矣若用食藥下之傳變諸症不可勝數附錄金匱枳朮湯治心下硬大如盤邊如旋杯水飲所作枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即散趙以德曰心下胃上脘也胃氣弱則所飲之水不消痞結而堅必強其胃消其痞白朮健脾強胃枳實善消心下痞逐停水散滯血磁朱丸千金方治神水寬大漸散皆如霧露中行漸睹空中有黑花睹物成二體及內障神水淡綠色淡白色又治耳鳴及聾磁石二兩煅辰砂一兩神麯生三兩更以一兩水和作餅煮浮搜入前藥煉蜜為丸每服十丸加至三十丸空心米湯下王又原曰經曰五臟六腑之精皆上注於目則目之能視者氣也目之所以能視者精也腎惟藏精故神水發於腎心為離照故神光發於心光發陽而外映有陰精以為守則不散而常明水發陰而凝結有陽氣以為布則洞悉而不窮惟心腎有虧致神水乾涸神光短少昏眊內障諸證所由作也磁石直入腎經收散失之神性能引鐵吸肺金之氣歸藏腎水硃砂體陽而性陰能納浮游之火而安神明水能鑑火能燭水火相濟而光華不四射與然目受臟腑之精精資於谷神麯能消化五穀則精易成矣蓋神水散大緩則不收賴鎮墜之品疾收而吸引之故為急救之劑也其治耳鳴耳聾等症亦以鎮墜之功能制虛陽之上奔耳柯韻伯曰此丸治癲癇之聖劑蓋狂癡是心腎脾三臟之病心藏神脾藏意與智腎藏精與志心者神明之主也主不明則十二官危使道閉塞而不通形乃大傷即此謂也然主何以不明也心法離而屬火真水藏其中若天一之真水不足地二之虛火妄行所謂天氣者蔽塞地氣者冒明日月不明邪害空竅故目多妄見而作此奇疾也非金石之重劑以鎮之狂必不止硃砂稟南方之赤色入通於心能降無根之火而安神明磁石稟北方之黑色入通於腎吸肺金之氣以生精墜炎上之火以定志二石體重而主降性寒而滋陰志同道合奏功可立俟矣神麯推陳致新上交心神下達腎志以生意智且食入於陰長氣於陽奪其食則已此內經治狂法也食消則意智明而精神治是用神麯之旨乎煉蜜和丸又甘以緩之矣四神二神五味子散四神丸治脾腎雙虛子後作瀉不思食不化食肉果二兩破故紙四兩炒五味子三兩吳茱萸五錢鹽湯泡過上為末紅棗四十九枚生薑四兩切水煮棗熟去姜取棗肉搗和藥丸桐子大空心鹽湯下二神丸去茱萸五味五味子散去肉豆蔻破故紙程郊倩曰命門無火不能為中宮腐熟水穀藏寒在腎誰復司其閉藏故木氣才萌不疏泄而亦疏泄雖是木邪乾土實腎之脾胃虛也此際補脾不如補腎補骨脂有溫中暖下之能五味子有酸收固澀之性吳茱萸散邪補土肉豆蔻澀滑益脾暖腎而使氣蒸破滯而使氣壯補腎仍是補脾矣李士材曰腎水受時於子弱土不能禁制故子後每瀉也柯韻伯曰瀉利為腹疾而腹為三陰之都會一臟不調便能瀉利故三陰下利仲景各為立方以主之太陰有理中四逆厥陰有烏梅白頭翁少陰有桃花真武豬苓豬膚四逆湯散白通通脈等劑可謂曲盡病情諸法備美柯論更妙不可廢也然只為一臟立法若三臟相關久留不痊如子後作瀉一症猶未之及也夫雞鳴至平旦天之陰陰中之陽也因陽氣當至而不至虛邪得以留而不去故作瀉於黎明其由有四一為脾虛不能制水一為腎虛不能行水故二神丸君補骨脂之辛燥者入腎以制水佐肉豆蔻之辛溫者入脾以暖土丸以棗肉又辛甘發散為陽也一為命門火衰不能生土一為少陽氣虛無以發陳故五味子散君五味子之酸溫以收坎宮耗散之火少火生氣以培土也佐吳茱萸之辛溫以順肝木欲散之勢為水氣開滋生之路以奉春生也此四者病因雖異而見症則同皆水亢為害二神丸是承製之劑五味散是化生之劑也二方理不同而用則同故可互用以助效亦可合用以建功合為四神丸是制生之劑也制生則化久泄自瘳矣稱曰四神比理中八味二丸較速與滋腎丸治肺痿聲嘶喉痹咳血煩躁黃柏二兩酒炒知母二兩酒浸炒肉桂一錢上為細末熟水丸桐子大每服五十丸空心下羅東逸曰此丸為腎家水竭火炎而設夫水竭則腎涸腎涸則下泉不鍾而陽盛於上斯喉痹痰結煩躁之證作火炎則金傷金傷則澤熯高原無以蒸呴布漚斯聲嘶咳血焦痿之證生此時以六味補水水不能遽生也以生脈保金金不免猶燥也惟急用黃柏之苦以堅腎則能殺龍家之沸火是謂浚其源而安其流繼用知母之清以涼肺則能全破傷之燥金是謂沛之雨而騰之露然恐水火之不相入而相射也故益以肉桂之反佐為用兼以導龍歸海於是坎盈窞而流漸長矣此滋腎之旨也柯韻伯曰水為腎之體火為腎之用人知腎中有水始能制火不知腎中有火始能制水耳蓋天一生水一者陽氣也即火也氣為水母陽為陰根必火有所歸斯水有所主故反佐以桂之甘溫引知柏入腎而奏其效此相須之殷亦承製之理也虎潛丸治腎陰不足筋骨痿軟不能步履龜板黃柏各四兩知母熟地各二兩牛膝三兩五錢芍藥一兩五錢鎖陽虎骨當歸各一兩陳皮七錢五分上為末煮羯羊肉搗為丸桐子大淡鹽湯下王又原曰腎為作強之官有精血以為之強也若腎虛精枯而血必隨之精血交敗濕熱風毒遂乘而襲焉此不能步履腰痠筋縮之症作矣且腎兼水火火勝爍陰濕熱相搏筋骨不用宜也方用黃柏清陰中之火燥骨間之濕且苦能堅腎為治痿要藥故以為君虎骨去風毒健筋骨為臣然高原之水不下母虛而子亦虛肝臟之血不歸子病而母愈病知母清肺原歸芍養肝血使歸於腎龜稟天地之陰獨厚茹而不吐使之坐鎮北方更以熟地牛膝鎖陽羊肉群隊補水之品使精血交補若陳皮者疏血行氣茲又有氣化血行之妙其為筋骨壯盛有力如虎也必矣道經云虎向水中生以斯為潛之義焉夫是以命之曰虎潛丸葉仲堅曰痿原雖分五臟然其本在腎其標在肺內經云五臟因肺熱葉焦發為痿躄又曰陽氣內伐水不勝火則骨痿髓虛故足不任身骨痿者生於大熱也若視為虛寒而投以桂附多致不救是方以虎名者虎於獸中稟金氣之至剛風生一嘯特為肺金取象焉其潛之云者金從水養母隱子胎故生金者必麗水意在納氣歸腎也虎潛之義發明妙極龜應北方之象稟陰最厚首常向腹善通任脈能大補真陰深得夫潛之義者黃柏味厚為陰中之陰專補腎膀之陰不足能使足膝中氣力湧出故痿家必用二者為君一以固本一以治標恐奇之不去則偶之也熟地填少陰之精用以佐龜板知母清太陰之氣用以佐黃柏牛膝入肝筋歸芍佐之肝血有歸陳皮疏之氣血以流骨正筋柔矣又慮熱則生風逗留骨節用虎骨所以驅之純陰無陽不能發生佐鎖陽所以溫之羊肉為丸補之以味淡鹽湯下急於入腎斯皆潛之為義越鞠丸治臟腑一切痰食氣血諸郁為痛為嘔為脹為利者香附蒼朮撫芎山梔仁神麯水發丸每服百丸季楚重曰內經論木鬱達之五句前聖治郁之法最詳所謂郁者清氣不升濁氣不降也然清濁升降皆出肺氣使太陰失治節之令不惟生氣不升收氣亦不降上下不交而鬱成矣故經云太陰不收肺氣焦滿又云諸氣憤郁皆屬於肺然肺氣之布必由胃氣之輸胃氣之運必本三焦之化甚至為痛為嘔為脹為利莫非胃氣不宣三焦失職所致方中君以香附快氣調肺之怫鬱臣以蒼朮開發強胃而資生神麯佐化水穀梔子清郁導火於以達肺騰胃而清三焦尤妙撫芎之辛直入肝膽以助妙用則少陽之生氣上朝而營衛和太陰之收氣下肅而精氣化此丹溪因五郁之法而變通者也然五郁之中金木尤甚前人用逍遙散調肝之郁兼清火滋陰瀉白散清肺之郁兼潤燥降逆要以木鬱上衝即為火金鬱斂澀即為燥也如陰虛不知滋水氣虛不知化液是又不善用越鞠矣封髓丹治夢遺失精及與鬼交黃柏砂仁甘草上蜜糊為丸每服三錢趙羽皇曰經云腎者主水受五臟六腑之精而藏之又曰腎者主蟄封藏之本精之處也蓋腎為慳臟多虛少實因肝木為子偏喜疏泄母氣厥陰之火一動精即隨之外溢況肝又藏魂神魂不攝宜其夜臥鬼交精泄之症作矣封髓丹為固精之要藥方用黃柏為君以其味性苦寒又能堅腎腎職得堅則陰水不虞其泛溢寒能清肅則龍火不至於奮揚水火交攝精有不安其位者乎佐以甘草以甘能緩急瀉諸火與肝火之內煩且能使水土合為一家以妙封藏之固若縮砂者以其味辛性溫善能入腎腎之所惡在燥而潤之者唯辛縮砂通三焦達津液能納五臟六腑之精而歸於腎腎家之氣內腎中之髓自藏矣此有取於封髓之意也左金丸治肝臟火實左脅作痛黃連六兩炒吳茱萸一兩湯泡上為末作丸胡天錫曰此瀉肝火之正劑肝之治有數種水衰而木無以生地黃丸癸乙同源是也土衰而木無以植參苓甘草散緩肝培土是也本經血虛有火用逍遙散清火血虛無水用歸脾湯養陰至於補火之法亦下同乎腎而瀉火之治則上類乎心左金丸獨用黃連為君從實則瀉子之法以直折其上炎之勢吳茱萸從類相求引熱下行並以辛溫開其鬱結懲其捍格故以為佐然必木氣實而土不虛者庶可相宜左金者木從左而制從金也資生丸治婦人妊娠三月脾虛嘔吐或胎滑不固兼丈夫調中養胃飢能使飽飽能使飢神妙難述人參三兩云術三兩茯苓二兩山藥二兩薏苡仁兩半蓮肉二兩芡實兩半甘草一兩炙陳皮二兩麥芽二兩神麯二兩白豆蔻八錢桔梗一兩藿香一兩川黃連四錢砂仁一兩半扁豆一兩半山楂一兩半上十八味為細末煉蜜丸彈子大每服二丸米飲下羅東逸曰此方始於繆仲醇以治妊娠脾虛及滑胎蓋胎資始於足少陰資生於足陽明故陽明為胎生之本一有不足則元氣不足以養胎又不足以自養故當三月正陽明養胎之候而見嘔逆又其甚者或三月或五月而墮此皆陽明氣虛不能固耳古方安胎類用芎歸不知此正不免於滑是方以參朮茯草蓮芡山藥扁豆薏苡之甘平以補脾元陳皮曲麥砂蔻藿桔之香辛以調胃氣其有濕熱以黃連清之燥之既無參苓白朮散之滯又無香砂枳朮丸之燥能補能運臻於致和於以固胎永無滑墮丈夫服之調中養胃名之資生信不虛矣脾約丸治腸胃燥熱大便秘結麻仁二升杏仁一斤枳實厚朴芍藥各八兩大黃一斤上為末蜜丸白湯下成無己曰約者約結之約又約束也經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行今胃強脾弱約束津液不得四布但輸膀胱小便數而大便硬故曰脾約麻仁甘平而潤杏仁甘溫而潤經曰脾欲緩急食甘以緩之本草曰潤可去結是以麻仁為君杏仁為臣枳實苦寒厚朴苦溫破結者必以苦故以為佐芍藥酸寒大黃苦寒酸苦湧泄為陰故以為使丹溪曰既云脾約血枯火燔金受邪而津竭必竊脾之母氣以自救金衰則土受邪脾失轉輸肺失傳化理宜滋陰降火金行清化脾土健旺津液既潤何秘之有此方惟熱甚而稟實者可用熱雖甚而虛者愈致燥涸之苦矣更衣丸治津液不足大便不通硃砂五錢研如飛面蘆薈七錢研細滴好酒少許和丸每服一錢二分好酒下柯韻伯曰胃為後天之本不及痼病太過亦病然太過復有陽盛陰虛之別焉兩陽合明而胃家實仲景制三承氣下之水火不交而津液亡前賢又制更衣丸以潤之古人入廁必更衣故為此丸立名用藥之義以重墜下達而奏功硃砂色赤屬火體重象金味甘歸土性寒類水為丹祖汞母能輸坎以填離生水以濟火是腎家之心藥也配以蘆薈黑色通腎苦味入心滋潤之質可轉濡胃燥大寒之性能下開胃關此陰中之陰詢為腎家主劑矣合以為丸有水火既濟之理水土合和之義兩者相須得效甚宏奏功甚捷真匪夷所思者備急丸治寒氣冷食稽留胃中心腹痛大便不通者大黃乾薑各一兩巴豆一兩去皮心熬研如脂先搗大黃乾薑為末納巴豆合搗千杵和蜜丸如豆大藏密器中勿泄氣候用每服三四丸暖水或酒下金匱主中惡心腹脹滿卒痛如錐刺氣急口噤如卒死者捧頭起灌令下咽須臾當瘥不瘥更與三丸當腹中鳴即吐利便瘥若口噤者亦須折齒灌之柯韻伯曰大便不通當分陽結陰結陽結有承氣更衣之劑陰結又製備急之方金匱用此治中惡當知寒邪卒中者宜之若用於溫暑熱邪速其死矣是方允為陰結者立乾薑散中焦寒邪巴豆逐腸胃冷積大黃通地道又能解巴豆毒是有制之師也乃仿仲景白散而加峻者歟白散治寒結在胸故用桔梗佐巴豆為吐下兩解法此寒結腸胃故用大黃佐薑巴以直攻其寒世徒知有溫補法而不知有溫下之治所以但講虛寒不議及寒實也當歸龍薈丸治肝經實火大便秘結小便澀滯或胸膈作痛陰囊腫脹凡屬肝經實火皆宜服之當歸龍膽草黃連黃芩梔子仁各一兩大黃蘆薈青黛各五錢木香二錢五分麝香五分另研上為末炒神麯糊丸每服二十丸薑湯下柯韻伯曰肝為相火有瀉無補青黛稟東方之色入通於肝大寒之性所以瀉其實火也夫東實西虛必瀉南補北而金氣始行故用梔子之赤色通心者率膽草芩連以瀉火而除胸膈之痛佐以蘆薈之黑色通腎者以補水而利小便以除陰囊之腫凡木氣鬱者必剋土此肝火亢則反能燥脾而實胃故用神麯疏脾大黃調胃以通大便之秘結也肝火旺則血虛故君當歸氣有餘便是火故佐二香丹溪云宜降氣不宜降火蓋為虛火言此火實剋金熱傷元氣治節不行允宜瀉火從芩連之例矣夫氣藥燥熱若不於大寒劑中用之皆倒戈之輩故必火降而氣始降亦必氣降而火不復升是知降氣降火又兩相須也四生丸治陽盛陰虛血熱妄行或吐或衄者生地黃生柏葉生荷葉生艾葉等分上四味搗爛為丸如雞子大每服一丸滾湯化服柯韻伯曰心腎不交則五臟齊損陰虛而陽無所附則火炎上焦陽盛則陽絡傷故血上溢於口鼻也凡草木之性生者涼而熟之則溫熟者補而生者瀉四味皆清寒之品盡取其生者而搗爛為丸所以全其水氣不經火煮更以遠於火令矣生地多膏清心腎而通血脈之源柏葉西指清肺金而調營衛之氣艾葉芳香入脾胃而和生血之司荷葉法震入肝家而和藏血之室五臟安堵則水火不相射陰平陽秘而血歸經矣是方也可暫用以遏妄行之熱血如多用則傷營蓋血得寒則瘀血不散而新血不生也設但知清火涼血而不用歸脾養營等劑以善其後鮮有不綿連歲月而斃者非立方之不善妄用者之過耳石斛夜光丸治神水寬大漸散昏如霧露空中有黑花及睹物成二神水淡綠淡白色者天門冬焙人參茯苓各二兩麥冬熟地生地各一兩枸杞子菟絲子甘菊花石斛乾山藥杏仁各七錢肉蓯蓉蒺藜川芎甘草炙黃連防風青葙子枳殼羚羊角鎊烏犀鎊各五錢牛膝七錢五分草決明八錢上為細末煉蜜丸桐子大每服三五十丸溫酒鹽湯下羅東逸曰此方為陽衰陰弱不能生精於目而設故目科與千金磁朱丸並重治證亦同然磁朱為鎮墜藥此為羨補藥針經曰五臟六腑精氣皆上於目而為之精故夫目之精明者陰陽合傳而為精明者也若腎肝虛則陰弱不能斂精以升養神水於內脾肺虛則陽衰不能攝陰而浮散神光於外以致神水寬大睹物成二此其治法其營在肝其主在腎其合在脾能合腎脾之陰而使肝達之則必能歸精於兩眸而繼明如晝夜矣是方先補腎肝以二冬二地菟絲枸杞五味牛膝蓯蓉群隊滋陰之品以之強陰填精斂氣安神養血此壯水之主亦所以生木也復以人參炙草茯苓山藥培補中宮使調合陰陽也佐之以蒺藜甘菊川芎枳殼防風行肝達氣青葙決明子解結散滯黃連烏犀羚角清火泄熱然必取石斛之妙合脾腎者清而行之要使升精歸明之用臟腑合德專精緻一耳其以為丸者補上治下利以緩利以久不利以速也礞石滾痰丸治實熱老痰之峻劑虛寒者不宜用黃芩大黃酒蒸各八兩沉香五錢忌火礞石一兩焰硝煅過陳久者佳新煅者有火毒不宜用上四味為細末水丸川椒大量人大小用之用溫水一口送過咽即便仰臥令藥徐徐而下半日不可飲食勿起身行動言語待藥氣自胃口漸下二腸然後動作飲食服後喉間稠黏壅塞不行者乃藥力相攻故痰氣泛上也少頃藥力到自然寧貼服之得法效如響應柯韻伯曰脾為生痰之原肺為貯痰之器此無稽之談也夫脾為胃行其津液以灌四旁而水精又上輸於肺焉得凝結而為痰惟腎為胃關關門不利故水聚而泛為痰也則當曰腎為生痰之原經云受谷者濁受氣者清清陽走五臟濁陰歸六腑肺為手太陰獨受諸氣之清而不受有形之濁則何可貯痰惟胃為水穀之海萬物所歸稍失轉味之職則濕熱凝結為痰依附胃中而不降當曰胃為貯痰之器駁得是此前人之濛濛後學不知而信之不加察者也斯義也惟王隱君知之故制老痰之方不涉脾肺而責之胃腎二黃礞石稟中央之黃色入通中宮者也黃芩能清理胃中無形之氣大黃能滌盪胃中有形之質然痰之為質雖滑而黏善棲泊於腸胃曲折之處而為巢穴不肯順流而下仍得緣涯而升故稱老痰二黃以滋潤之品只能直行而泄欲使委曲而導之非其所長也故選金石以佐之礞石之燥可以除其濕之本而其性之悍可以迅掃其曲折依伏之處使穢濁不得膩滯而少留此滾痰之所由名乎又慮夫關門不開仍得為老痰之窠臼沉香稟北方之色能內氣歸腎又能疏通腸胃之滯腎氣流通則水垢不留而痰不再作且使礞石不黏著於腸二黃不傷及於胃一舉而三善備所以功效若神也指迷茯苓丸治中焦停痰伏飲半夏制二兩茯苓一兩風化硝二錢半枳殼五錢上四味薑汁糊為丸柯韻伯曰痰飲之本皆水也水入於胃遊溢精氣上輸於脾此自陽入陰也脾氣散精上歸於肺此地氣上升也通調水道下輸膀胱是天氣下降也水精四布五經並行是水入於經而血乃成也若陰陽不和清濁相干胃氣亂於中脾氣艱於升肺氣滯於降而痰飲隨作矣痰與飲同源而有陰陽之別陽盛陰虛則水氣凝而為痰陰盛陽虛則水氣溢而為飲痰飲之別清出除痰者降氣清火是治其標補陰利水是治其本也滌飲者降氣燥濕是治其標溫腎利水是治其本也此方欲兼兩者而合治之半夏燥濕茯苓滲濕風硝軟堅枳殼利氣別於二陳之甘緩遠於礞石之峻悍亦平胃之劑耳大黃䗪蟲丸治五勞七傷內有乾血肌膚甲錯兩目黯黑大黃十兩酒蒸黃芩二兩炒甘草三兩桃仁去皮尖炒杏仁去皮尖炒芍藥各四兩炒地黃十兩乾漆一兩炒虻蟲一兩五錢去翅足炒水蛭百枚炙黃蠐螬一兩半炒䗪蟲一兩去頭足炒上十二味為末蜜丸如小豆大酒服五丸日三服李士材曰勞傷之症未有無瘀血者也瘀之日久則發為熱熱涸其液則干黏於經絡之間愈干愈熱愈熱愈干而新血皆損人之克養百骸光華潤澤者止藉此血血傷則無以沃其膚故甲錯也目得血而能視營氣不貫於空竅故黑黯也仲景洞見此症補之不可涼之無益而立此方經曰血主濡之故以地黃為君堅者削之故以大黃為臣統血者脾也脾欲緩急食甘以緩之又酸苦湧泄為陰故以甘芍桃杏為佐咸走血苦勝血故以乾漆之苦四蟲之咸為使吳氏曰濁陰不降則清陽不升瘀血不去則新血不生今人遇一勞症便用滋陰服而不效坐以待斃術豈止此耶烏梅丸治厥陰病消渴氣上撞心心中疼熱飢而不欲食食即吐蛔又主久利烏梅三百枚黃連一斤細辛附子炮人參桂枝黃柏各六兩乾薑十兩當歸蜀椒各四兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得納臼中與蜜杵二千下丸如桐子大先食飲服十丸日三服稍加至一二十丸禁生冷滑物臭食柯韻伯曰六經惟厥陰為難治其本陰其標熱其體木其用火必伏其所主而先其所因或收或散或逆或從隨所利而行之調其中氣使之和平是治厥陰法也治厥陰大法厥陰當兩陰交盡又名陰之絕陽宜無熱矣第其具合晦朔之理陰之初盡即陽之初生所以一陽為紀一陰為獨使則厥陰病熱是少陽使然也火旺則水虧故消渴氣上撞心心中疼熱氣有餘便是火也木盛則剋土故飢不欲食蟲為風化飢則胃中空虛蛔聞食臭出故吐蛔敘厥陰症明晰仲景立方皆以辛甘苦味為君不用酸收之品而此用之者以厥陰主肝木耳洪範曰木曰曲直作酸內經曰木生酸酸入肝君烏梅之大酸是伏其所主也配黃連瀉心而除疼佐黃柏滋腎以除渴先其所因也腎者肝之母椒附以溫腎則火有所歸而肝得所養是固其本肝欲散細辛乾薑辛以散之肝藏血桂枝當歸引血歸經也寒熱雜用則氣味不和佐以人參調其中氣以苦酒漬烏梅同氣相求蒸之米下資其穀氣加蜜為丸少與而漸加之緩則治其本也蛔昆蟲也生冷之物與濕熱之氣相成故藥亦寒熱互用且胸中煩而吐蛔則連柏是寒因熱用也蛔得酸則靜得辛則伏得苦則下信為化蟲佳劑久利則虛調其寒熱酸以收之下利自止平胃散治濕淫於內脾胃不能剋制有積飲痞膈中滿者蒼朮五斤泔浸七日陳皮去白厚朴各三斤薑汁炙甘草三十兩炙上為末每服三錢薑湯下日三服又水煎每服七錢柯韻伯曰內經以土運太過曰敦阜其病腹滿不及曰卑監其病留滿痞塞張仲景制三承氣湯調胃土之敦阜李東垣制平胃散平胃土之卑監也培其卑者而使之平非削平之謂猶溫膽湯用涼劑而使之溫非用溫之謂後之注本草者曰敦阜之土宜蒼朮以平之卑監之土宜白朮以培之若以濕土為敦阜將以燥土為卑監耶不審敦阜卑監之義因不知平胃之理矣二術苦甘皆燥濕健脾之用脾燥則不滯所以能健運而得其平第二術白者柔而緩蒼者猛而悍此取其長於發汗迅於除濕故以蒼朮為君耳不得以白補赤瀉之說為二術拘也厚朴色赤苦溫能助少火以生氣故以為佐濕因於氣之不行氣行則愈故更以陳皮佐之甘先入脾脾得補而健運故以炙甘草為使名曰平胃實調脾承氣之劑與夫潔古取金匱之枳朮湯以為丸枳實之峻重於厚朴且無甘草以和之雖倍白朮而消伐過於此方昧者以術為補為當久服不思枳實為峻而不宜多特未之思耳瓜蒂散邪結胸中胸中痞硬寸脈微浮氣上衝咽喉不得息或心下滿而煩飢不能食手足厥冷脈乍緊者或飲食入口即吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者皆宜用此吐之亡血虛家不可與也瓜蒂赤小豆熬黃各一合香豉一合上二味別搗為散取一錢用香豉一合熱湯七合煮作稀糜去滓取汁和散溫服之不吐者少少加得快吐乃止柯韻伯曰胸中者清虛之府寒邪凝結內熱不得外達以至痞硬其氣上衝心下煩心中溫者熱鬱也脈微浮或弦遲或乍緊手足寒飲食入口即吐者寒束也咽喉不得息心下滿飢不能食欲吐不能吐者寒格而熱不得越也辨症精晰肺氣不得降胃陽不得升諒非汗下之法所能治必得酸苦湧泄之品因而越之上焦得通中氣得達肺家之治節行胸中之陽氣復痞硬可得而消耳瓜蒂色青象東方甲木之化得春升生髮之機能提胃中陽氣除胸中實邪為吐劑中第一品然必得穀氣以和之赤豆形色象心甘酸以保心氣香豉形色象腎性本沉重黴熟而使輕浮能使腎家之清氣交於心胸中之濁氣出於口作為稀糜調服二散雖快吐而不傷神奏功之捷勝於汗下此所以三法鼎立耳今人不知岐伯仲景之精義置之不用汗之下之變證蜂起可勝悼哉天水散一名益元散一名六一散治夏時中暑熱傷元氣內外俱熱無氣以動煩渴欲飲腸胃枯涸者又能催生下乳積聚水蓄裡急後重暴注下迫者宜之桂府滑石六兩水飛甘草一兩辰砂三錢上為細末新汲水一碗調服三錢柯韻伯曰元氣虛而不支者死邪氣盛而無制者亦死今熱傷元氣無氣以動斯時用參耆以補氣則邪愈甚用芩連以清熱則氣更傷惟善攻熱者不使喪人元氣善補虛者不使助人邪氣必得氣味純粹之品以主之滑石稟土中衝和之氣行西方清肅之令秉秋金堅重之形寒能勝熱甘不傷脾含天乙之精而具流走之性異於石膏之凝滯能上清水原下通水道盪滌六腑之邪熱從小便而泄矣甘草稟草中衝和之性調和內外止渴生津用以為佐保元氣而瀉虛火則五臟自和矣然心為五臟主暑熱擾中神明不安必得硃砂以鎮之則神氣可以遽復涼水以滋之則邪熱可以急除此補心之陽寒亦通行也至於熱利初起裡急後重者宜之以滑可去著也催生下乳積聚蓄水等症同乎此義故兼治之是方也益氣而不助邪逐邪而不傷氣不負益元之名矣宜與白虎生脈三方鼎足可也阿膠散治肺虛有火嗽無津液咳而哽氣者真阿膠一兩半牛蒡子二錢半炒馬兜鈴五錢焙炙甘草五錢杏仁七錢糯米一合上為細末每服兩許水煎服程郊倩曰痰帶紅線嗽有血點日漸成痿緣肺處臟之最高葉間布有細竅氣從此出入呼吸成液灌溉周身所謂水出高原也一受火炎吸時徒引火升呼時並無液出久則肺竅俱閉喉間或癢或瘡六葉遂日焦枯矣今用阿膠為君者消竅瘀也用杏仁大力子者宣竅道也用馬兜鈴者清竅熱也糯米以補脾母氣到肺自輕清無礙矣玉屏風散治風邪久留而不散者自汗不止者亦宜防風黃耆白朮等分上為細末酒調服柯韻伯曰邪之所湊其氣必虛故治風者不患無以驅之而患無以御之不畏風之不去而畏風之復來何則發散太過玄府不閉故也昧者不知托裡固表之法遍試風藥以驅之去者自去來者自來邪氣留連終無解期矣防風遍行周身稱治風之仙藥上清頭目七竅內除骨節疼痹外解四肢攣急為風藥中之潤劑治風獨取此味任重功專矣然衛氣者所以溫分肉而充皮膚肥腠理而司開闔惟黃耆能補三焦而實衛為玄府御風之關鍵且有汗能發無汗能止功同桂枝故又能除頭目風熱大風癩疾腸風下血婦人子臟風是補劑中之風藥也所以防風得黃耆其功愈大耳白朮健脾胃溫分肉培土即以寧風也夫以防風之善驅風得黃耆以固表則外有所衛得白朮以固里則內有所據風邪去而不復來此欲散風邪者當倚如屏珍如玉也其自汗不止者亦以微邪在表皮毛肌肉之不固耳其與防風通聖等方懸殊矣五淋散治膀胱有熱水道不通淋澀不出或尿如豆汁或成砂石或如膏汁或熱怫便血赤茯苓一錢五分赤芍藥山梔仁各一錢當歸細甘草各一錢二分上五味加燈心水煎服柯韻伯曰經曰腎合膀胱故腎為水臟而膀胱為水腑腎主癸水受五臟六腑之精而藏之膀胱主壬水受五臟六腑之津而藏之故膀胱者州都之官津液藏焉然又曰氣化則能出者何也膀胱有上口而無下口能納而不能出唯氣為水母必太陽之氣化而膀胱之溺始出是水道固藉無形之氣化不專責有形之州都矣然水者陰也氣者陽也氣為陽之根源而火為陽之徵兆所以氣有餘便成壯火而為邪熱壯火上行三焦則傷太陽之氣邪熱下入膀胱則涸州都之津火勝則水虧理固然也夫五臟之水火皆生於氣故少火生氣而氣即為水水精四布下輸膀胱源清則流潔矣如壯火食氣則化源無藉乃癃閉淋澀膏淋豆汁砂石膿血而水道為之不利矣總由化源之不清非關決瀆之失職若以八正舟車禹功浚川等劑治之五臟之陰虛太陽之氣化絕矣故急用梔苓治心肺以通上焦之氣而五志火清歸芍滋腎肝以安下焦之氣而五臟陰復甘草調中焦之氣而陰陽分清則太陽之氣自化而膀胱水潔矣此治本之計法之盡善者也失笑散治產後心腹絞痛欲死或血迷心竅不省人事五靈脂蒲黃等分每服三錢酒煎服獨聖散附山楂肉二兩水煎用童便砂糖和服吳於宣曰經云心主血脾統血肝藏血故產後瘀血停滯三經皆受其病以致心腹疼痛惡寒發熱神迷眩暈胸膈滿悶凡茲者由寒凝不消散氣滯不流行惡露停留小腹結痛迷悶欲絕非純用甘溫破血行血之劑不能攻逐蕩平也是方用靈脂之甘溫走肝生用則行血蒲黃甘平入肝生用則破血佐酒煎以行其力庶可直抉厥陰之滯而有其推陳致新之功甘不傷脾辛能逐瘀不覺諸證悉除直可以一笑而置之矣至獨聖散用山楂一味濃煎與砂糖童便同服者何也山楂不惟消食健脾性能破瘀積瘕癖可立止兒枕作疼更益以砂糖味甘入脾能逐惡暖中而不傷脾童便涼下而不傷氣以佐山楂則脾氣得宜山楂之功用益力其效益偉名之曰獨聖不虛也清胃散治胃經濕熱牙齒牙根腫痛或牽引頭腦或面發熱生地黃當歸川黃連升麻牡丹皮水煎服羅東逸曰陽明胃多氣多血又兩陽合明為熱盛是以邪入而為病常實若大渴舌苔煩躁此傷氣分熱炙大腑燥其津液白虎湯主之若醇飲肥厚炙爆過用以致熱壅大腑逆於經絡濕熱不宣此傷血分治宜清胃方中以生地涼血為君行之牡丹皮去蒸而疏其滯以黃連徹熱燥濕為臣和之以當歸辛散而循其經仍用升麻之辛涼升舉以騰本經之清氣即所謂升清降濁火鬱發之者也如是而喉咽不清齒齦腫痛等症廓然俱清矣龜鹿二仙膠大補精髓益氣養神鹿角血者十斤龜板自敗者五斤枸杞子甘州者二十兩人參十五兩上用鉛壇如法熬膠初服酒化一錢五分漸加至三錢空心下李士材曰人有三奇精氣神生生之本也精傷無以生氣氣傷無以生神精不足者補之以味鹿得天地之陽氣最全善通督脈足於精者故能多淫而壽龜得天地之陰氣最厚善通任脈足於氣者故能伏息而壽二物氣血之屬又得造化之玄微異類有情竹破竹補之法也人參為陽補氣中之怯枸杞為陰清神中之火是方也一陰一陽無偏勝之憂入氣入血有和平之美由是精生而氣旺氣旺而神昌庶幾龜鹿之年矣故曰二仙瓊玉膏治虛勞乾咳生地黃四斤白茯苓十二兩白蜜二斤人參六兩上以地黃汁同蜜熬沸用絹濾過將參茯為細末入前汁和勻以瓷瓶用棉紙十數層加箬封瓶口入砂鍋內以長流水煮沒瓶頸桑柴火煮三晝夜取出換紙札口以蠟封固懸井中一日取起仍煮半日白湯點服李士材曰乾咳者有聲無痰火來乘金金極而鳴也此本元之病非悠遊漸漬難責成功若誤用苦寒只傷脾土金反無母故丹溪以地黃為君令水盛則火自息又損其肺者益其氣故用人參以鼓生髮之元虛則補其母故用茯苓以培萬物之本白蜜為白花之精味甘歸脾性潤悅肺且緩燥急之火四者皆溫良和厚之品誠堪寶重郭機曰起吾沉瘵珍賽瓊瑤故有瓊玉之名附補方藥雜論十七條張景岳曰沽古枳朮丸以白朮為君脾得燥而能健佐以枳實其味苦峻有推牆倒壁之功此寓攻於守之劑唯脾氣不清而滯勝者宜之若脾氣已虛非所宜也今以為補脾之藥及小兒瘦弱制令常服適足傷其氣助其瘦耳東垣平胃散欲治其不平也本為胃強邪實者設故性味從辛燥從苦而能消散唯有滯有濕有積者宜之若以為健脾而常服其誤甚矣補中益氣一湯允為東垣獨得之心法本方以升柴助升氣以參朮歸耆助陽氣此意誠盡善矣然補陽之義亦有宜否如治勞倦內傷發熱為助陽也非發汗也然有不散而散之意故於勞倦感寒或陽虛痎瘧及脾氣下陷等症最宜若全無表邪寒熱而中氣虧甚者則升柴大非所宜蓋升柴之味兼苦寒升柴之性兼疏散唯有邪者可因升而散之若無邪大虛者即純用培補猶恐不及再兼疏散安望成功凡補陽之劑無不能升正以陽主升也寇宗奭極言五勞七傷大忌柴胡而李時珍以為不然要之能散者斷不能聚能泄者斷不能補性味苦寒者斷無扶陽之物故表不固而汗不斂者不可用外無表邪而陰虛發熱者不可用陽氣無根而格陽戴陽者不可用脾肺虛甚而氣促似喘者不可用命門火衰而虛寒泄瀉者不可用水虧火旺而衄血吐血者不可用四肢厥而陽虛欲脫者不可用總之元氣虛極者不可泄陰陽下竭者不可升人但知補中益氣可以補虛不知幾微關係判於舉指之間纖微不可紊誤者正此類也神麯麥芽雖助戊土以腐熟水穀然麥芽一味治婦人喪子乳房脹痛欲成癰者用一二兩炒熟煎服即消其破血散氣可知矣又婦人良方云神麯善下胎皆克伐之功多而補益少不宜輕用喻嘉言曰連芩柴芍知母皆苦寒之劑能瀉有餘之火耳若飲食勞倦內傷元氣為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘平之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑濟之如生地玄參之屬若命門火衰為陽脫之病以溫熱之劑固之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升陽之劑發之如升麻葛根之屬不明治法以求施治何所據依耶今人見煩熱枯燥等症不敢用附子者惡其以熱助熱也孰知不藏精之人腎中陽氣不鼓精液不得上升故枯燥外見必於補陰劑中用附子助陽則陰氣上交於陽位如釜底加薪則釜中氣水上騰而潤澤有立至者黑鉛一味乃水之精入北方壬癸凡遇陰火逆沖真陽暴脫氣喘痰鳴之急症同桂附回陽等藥用之立見奇功即經云重劑是也虞天民曰血不歸原責之胃寒涼屢用不效唯炙甘草炮姜輩引血歸原妙失血後大熱大渴症似白虎惟脈虛大不長實為異誤服寒涼必死當歸補血湯主之趙羽皇曰參者參也與元氣為參贊者也不特氣虛宜用即血虛亦宜用內傷宜用外感亦宜用蓋煩渴由乎火邪得人參而陰津自長腫脹本乎氣壅得人參而痞悶全消以至食不欲入食入反脹或胃反噎膈泄利亡陰灑淅惡寒多汗漏風等症無不賴人參之大力作元氣之藩籬而妄謂肺熱傷肺參能作飽不知肺金之冤熱非參莫救脾虛之中滿非參與術何由健運此所以功魁群草也附子一味有斬關奪門之勇引補氣藥行十二經以追散失之元陽引補血藥入血分蒸動不足之真陰引發散藥開腠理以驅在表之風寒引溫藥達下焦以逐在裡之冷濕其用亦宏矣正治人所易曉其最妙能以熱攻熱如胃陽發露口爛舌糜腎陽發露面赤吐紅用之頃刻神清熱退唯其能返本回陽也世人豈識之哉柯韻伯曰仲景備十劑之法輕可散實麻黃葛根諸湯是也宣可決壅梔豉瓜蒂之方是也通可去滯五苓十棗之屬是也泄可去閉陷胸承氣抵擋是也滑可去著膽導蜜煎是也澀可固脫赤石脂桃花湯是也補可扶弱附子湯理中丸是也重可鎮怯禹餘糧代赭石湯是也濕可潤燥黃連阿膠湯是也燥可去濕麻黃連翹赤小豆湯是也寒能勝熱白虎湯黃連瀉心湯是也熱可制寒白通四逆諸方是也看仲景加減法當細審其深意如腹中痛者少陽加芍藥少陰加附子太陰加人參若心下悸者少陰加桂枝少陽加茯苓若渴者少陽加栝蔞根人參太陰加白朮仲景於加減中分陰陽表裡如此故熟仲景方始知仲景立方之妙理會仲景法才知仲景用藥取捨之精仲景立方精而不雜其中以六方為主諸方皆從而加減焉凡汗劑皆本桂枝吐劑皆本梔豉攻劑皆本承氣和劑皆本柴胡寒劑皆本瀉心溫劑皆本四逆渾而數之為一百一十三方者未之審耳小柴胡方為半表而設而其證皆屬於里蓋表證既去其半則病機偏於向里矣惟往來寒熱一證尚為表邪未去故獨以柴胡一物主之其他悉用里藥凡里證多陰多寒多虛而少陽之裡偏於陽偏於熱有虛有實而不盡屬於虛也然仲景又深以裡虛為患故於半表未解時便用人參以固里桂枝本為太陽風寒設可以散六經初感之邪柴胡本為少陽半表設更可以調三陽半表之證蓋桂枝湯是調和營衛之劑柴胡湯是調和腠理之劑凡風寒襲人不在營衛即入腠理所以仲景一書最重二方脾為至陰居中宮而撫四肢最畏寒邪為患故仲景制理中四逆二方理中者理中焦為腹痛吐利而設若手足逆冷下利清穀是太陰本病觀四逆證上不稱厥陰少陰有此證者必見面赤故以通脈加之則四逆本為太陰立可知也然他經有此陰寒者可通用之用於太陰本經是固本以逐邪也用於少陰溫土以制水也用於厥陰和水土以生木也用於太陽益火以扶元陽也惟陽明胃實少陽相火非所宜耳腎主五液入心為汗少陰受病液不上升所以陰不得有汗仲景治少陰之表於麻黃細辛中加附子是升腎液也若少陰無主水火不和真陰為邪所逼則水隨火越故反汗出仲景治少陰之裡附子湯中任人參是補腎液也
