body:
  text: 卷三葛根黃芩黃連湯治太陽誤下邪熱入里脈促喘而下利葛根半斤甘草黃芩各二兩黃連三兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服喻嘉言曰太陽病原無里症但當用桂枝解外若反下之則邪熱之在太陽者未入陽明之經已入陽明之腑所以其脈促急其汗外越其氣上奔則喘下奔則泄故舍桂枝而用葛根以專主陽明之表加芩連以清裡熱則不治喘而喘自止不治利而利自止此又太陽兩解表裡變法也桂枝湯去桂加茯苓白朮湯服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之小便利則愈桂枝湯去桂加白朮茯苓各三兩減芍藥一兩柯韻伯曰汗出不徹而遽下之表證仍在而反無汗更見心下滿痛此謂有表裡證矣病機向里即當究其里滿而不硬痛而微此非結熱必水氣凝滯而然當問其小便若小便利者邪未犯本病仍在表仍須汗散如小便不利者由膀胱之水氣不行故營衛之津液不出而非桂枝證未罷也欲利小便者不得更發汗故去桂枝而君以苓術則薑芍即散邪利水之佐甘棗效培土製水之功非復辛甘發散之劑矣此水結中焦可利而不可散所以與小青龍五苓不同法但得膀胱水去而太陽表裡之證悉除此為治病必求於本耳經曰血之與汗異名而同類又曰膀胱津液氣化而後能出是汗由血化小便由氣化也桂枝是血分藥但能發汗不能利水按五苓散云多服暖水汗出愈此云小便利則愈可明用桂去桂之理今人不審仲景法妄謂仲景制五苓以利水豈不悖哉黃芩湯治太陽少陽合病自下利者若嘔者加半夏生薑黃芩甘草芍藥各三兩大棗十二枚上四味以水一斗煮取三升去滓溫服一升日再服夜一服嘔者加半夏半斤生薑三兩程郊倩曰此之合病者頭痛胸滿口苦咽乾目眩或往來寒熱脈或大而弦半表之邪不待太陽傳遞而即合太陽並見經氣不無失守所以下利陽熱漸勝表實裡虛則邪熱得乘虛而攻及裡氣故用黃芩湯清熱益陰半里清而半表自解矣柯韻伯曰太陽少陽合病是熱邪已入少陽之裡膽火上逆移熱於脾故自下利與黃芩湯酸苦相濟以存陰也熱不在半表故不用柴胡今熱已入半里故黃芩主之雖非胃實亦非胃虛故不須人參以補中也兼痰飲則嘔故仍加半夏生薑黃連湯治傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連甘草乾薑各三兩人參二兩桂枝三兩半夏半斤大棗十二枚上七味以水一斗煮取六升去滓溫服一升日三服夜二服程郊倩曰熱在胸中有煩躁鬱悶之症可知胃中反有邪氣以寒邪被格在下故也此證寒熱俱有較之大青龍之寒熱已向近里一層故其症不見之表裡際而只見之上下際腹中痛者陰不得上而寒乃獨治於下也欲嘔吐者陽不得下而熱乃獨治於上也此為上下相格則治法亦寒熱並施而辛寒易以苦寒辛熱加以苦熱更用人參半夏以補宣中氣升降陰陽自此條而互及瀉心諸湯皆其法也仲景方中往往寒熱並用黃連湯之用乾薑此其關頭也成無己曰濕家下後舌上如胎者以丹田有熱胸中有寒是邪氣入里而為下熱上寒也此傷寒邪氣傳裡而為下寒上熱也喻氏曰陰陽悖逆皆當和解法十棗湯治太陽中風表解后里氣不和下利嘔逆心中至脅痞滿硬痛汗出短氣頭痛不惡寒者此治水之急方也大棗十枚掰甘遂大戟芫花熬各等分上三味各別搗為散以水一升半先煮大棗肥者十枚取八合去滓納末藥強人一錢羸人服半錢平旦溫服若下少病不除者明日再服加半錢得快下後糜粥自養柯韻伯曰仲景利水之方種種不同此其最峻者也凡水氣為患或喘或咳或悸或噎或吐或利或無汗病在一處而止此則外走皮毛而汗出上走咽喉而嘔逆下走腸胃而下利水邪之泛溢於外者浩浩莫御矣且頭痛短氣心腹脅下皆痞滿而硬痛是水邪尚留結於中三焦升降之氣阻隔而難通矣表邪已罷非汗散之法所宜里邪充斥又非淡滲之品所能勝非選利水之所至峻者以直折之中氣不支束手待斃耳甘遂芫花大戟三味皆辛苦氣寒而稟性最毒並舉而用之氣味合相濟相須故可交相去邪之巢穴決其瀆而大下之一舉而水患可平也然水利所湊其元氣已虛而毒藥攻邪必脾胃反弱使無健脾調胃之品為主宰邪氣盡而大命亦隨之矣故選十棗之大而肥者以君之一以培脾土之虛一以制水氣之橫一以解諸藥之毒得一物而三善備既不使邪氣之盛而不制又不使元氣之虛而不支此仲景立法之盡善也昧者惑於甘能中滿之說而不敢用豈知承製之理乎張子和竊此意而制浚川禹功神祐等方以治水腫痰飲之病而不知君補劑以培本但知任毒藥以攻邪所以善其後者鮮矣小陷胸湯治心下痞按之則痛脈浮滑者黃連一兩半夏半升栝蔞實大者一個上三味以水六升先煮栝蔞實取三升去滓納諸藥煮取二升分溫三服程扶生曰此熱結未深者在心下不若大結胸之高在心上按之痛比手不可近為輕脈之浮滑又緩於沉緊但痰飲素盛挾熱邪而內結所以脈見浮滑也以半夏之辛散之黃連之苦瀉之栝蔞之苦潤滌之所以除熱散結於胸中也先煮栝蔞分溫三服皆以緩治上之法程郊倩曰黃連滌熱半夏導飲栝蔞潤燥合之以開結氣亦名曰陷胸者攻雖不峻而一皆直瀉其胸裡之實邪亦從此奪矣大陷胸湯主治傷寒發熱不發汗而反下之表熱乘虛入於胸中與不得為汗之水氣結而不散令心下至小腹硬滿而痛不可近其人身無大熱但頭汗出或潮熱燥渴脈沉緊者如水腫腸澼初起形氣俱實者亦可用大黃六兩芒硝葶藶子杏仁去皮各半升甘遂一錢為末上五味以水先煮大黃杏藶去滓納芒硝煮一二沸納甘遂末溫服得快利止後服如未劇者加白蜜二合作丸如彈子大水煮一丸服過宿乃下如不下更服柯韻伯曰胸中者宗氣之所出故名氣海氣為陽故屬太陽之部氣為水母氣清則水精四布氣熱則水濁而壅結矣水結於胸則津液不下無以潤腸胃故大便必燥不下輸膀胱其水道不通大黃芒硝善滌腸胃之熱實此病在胸中而亦用以為君者熱淫於內當治以苦寒且以潤陽明之燥是實則瀉子之法補膀胱之寒亦制之以其所畏也任甘遂之苦辛所以直攻其水結然水結因於氣結必佐杏仁之苦溫以開其水中之氣氣行而水自利矣水結又因於氣熱必佐葶藶之大寒以清其氣分之熱源清而流自潔矣若胸中水結而未及中焦者當小其制而復以白蜜之甘以緩之使留連於胸中過宿乃下但解胸中之結滯而保腸胃之無傷是又以攻劑而為和劑矣是方為利水攻積之劑故治水腫痢疾之初起者甚捷然必視其人壯實可以一戰成功如平素虛弱者病久而任攻伐者當念虛虛之戒矣五瀉心湯半夏瀉心湯傷寒五六日嘔而發熱柴胡證具而以他藥下之但滿而不痛此為痞宜半夏瀉心湯半夏半斤黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩上七味以水一斗煮取六升分溫三服此小柴胡去柴胡而加乾薑黃連大黃黃連瀉心湯傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯心下痞按之濡其脈關上浮者大黃黃連瀉心湯大黃二兩黃連一兩以麻沸湯二升漬之須臾絞去滓服之附子瀉心湯心下痞而復惡寒汗出者附子瀉心湯大黃二兩黃連一兩黃芩一兩附子一枚別煮取汁以麻沸湯二升漬三味須臾去滓納附子汁生薑瀉心湯傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯生薑四兩甘草人參各三兩乾薑一兩黃連一兩黃芩三兩半夏半升大棗十二枚上八味以水一斗煮取六升分溫三服甘草瀉心湯傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯甘草四兩黃芩乾薑各三兩半夏半升黃連一兩大棗十二枚上六味以水一斗煮取六升去滓分溫三服王又原曰病發於陰而反下之因作痞然亦有汗出解之後而痞者亦有下後復汗而痞者亦有不經汗下而痞者大要結胸屬實痞屬虛結胸熱入痞無熱入藥用苦以瀉之辛以散之是也然仲景立五瀉心湯藥有同異其同者黃連乾薑若黃芩大棗則異而同也其異者人參附子大黃若半夏甘草生薑則同而異者也試論之傷寒五六日柴胡證具而以他藥下之成痞即用小柴胡湯以乾薑易生薑以黃連易柴胡彼以和表裡此以徹上下而必推半夏為君者痞從嘔得來半夏之辛以破結主病之藥故也汗出解之後已無傷寒矣胃藏津液發汗則津液亡故胃中不和薑棗以和榮衛以生髮胃家升騰之氣乃治雜證之標的也一屬少陽一屬汗解人參在所必用耳若傷寒中風正在太陽無用人參之例雖下而復下為胃中虛不可用也但用甘草緩其下利之急速和其客氣之上逆溫其中氣之不調補其心煩之不安焉耳心下硬滿痞之候也緊反入里痞之診也按之濡關上浮為痞尚未成故無用虜荊之六十萬但假將軍之先聲以奪之此漬以麻沸湯須臾去滓僅得其無形之氣不用其有形之味也心下痞惡寒者為兼有之症明系表邪未解心下痞而復惡寒者為續見之證明系陽氣外亡況加以汗出乎兼見者以兩湯治之續見者以一湯救之其附子則煮汁者是取三黃之氣輕取附子之力重也然胃居心下心下痞者胃痞也不曰瀉胃而曰瀉心恐混以苦寒傷其胃陽又誤為傳入陽明以治陽明之法治之也此仲景之微旨也桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此方主之桂枝湯加附子一枚炮去皮破八片煎服同不須啜粥柯韻伯曰發汗太過陽無所止息而汗出不止矣汗多亡陽玄府不閉風乘虛入故復惡風津液外泄不能潤下故小便難四肢者諸陽之本陽氣者柔則養筋開闔不得寒氣從之故筋急而屈伸不利此離中陽虛不能斂液當用桂枝湯補心之陽陽密則漏汗自止惡風自罷矣坎中陽虛不能行水必加附子以回腎之陽陽回則小便自利四肢自柔矣汗漏不止與大汗出同而來由則異服桂枝後大汗出而大煩渴是陽陷於裡急當滋陰故用白虎加參以和之用麻黃湯遂漏不止是陽亡於外急當扶陽故用桂枝加附以固之要知發汗之劑用桂枝不當則陽陷於裡用麻黃不當則陽亡於外因桂枝湯有芍藥而無麻黃故雖汗大出而玄府仍能自閉斷不致亡陽於外耳桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者桂枝四兩甘草二兩炙上二味水三升煮取一升頓服柯韻伯曰汗出多則心液虛氣餒故悸叉手自冒則外有所衛得按則內有所依如此不堪之狀望之而知其虛矣桂枝本營分藥得麻黃生薑則令營氣外發而為汗從辛也得芍藥則收斂營氣而止汗從酸也得甘草則補營氣而養血從甘也妙議故此方以桂枝為君獨任甘草為佐以補心之陽汗雖多而不至於亡陽甘溫相得斯血氣和而悸自平與治心中煩心下有水氣而悸者迥別乃補心之峻劑也芍藥甘草附子湯發汗病解反惡寒者虛故也此方主之芍藥三兩甘草二兩炙附子一枚炮去皮破八片上三味以水五升煮取一升五合去滓分溫服柯韻伯曰發汗病解而反惡寒比未汗時更甚其陽虛可知矣夫太陽少陰為表裡太陽之病本由少陰之虛不能藏精而為陽之守也今惡寒反見於發汗病解後是寒邪已從汗解太陽之虛不能衛外而為陰之使也則陽亡之兆已見於此若仍以桂枝湯攻表非以扶陽反以亡陽也故以芍藥收少陰之精氣甘草緩陰邪之上行附子補坎宮之少火但使腎中元陽得位在表之虛陽惡寒自解耳桂枝去芍藥加麻黃附子細辛湯治水飲在氣分心下堅大如盤邊如旋杯者桂枝三兩生薑三兩甘草二兩炙大棗十二枚麻黃二兩細辛二兩附子一枚炮上七味以水七升先煮麻黃去沫納諸藥煮取二升分溫三服當汗出如蟲行皮中即愈柯韻伯曰水飲者少陰所主心下者太陽之部心下有水氣至於堅大如盤是五臟之陽已竭也惟邊如旋杯狀尚有一線之微陽斯時欲利水則水堅而不可破欲行氣則氣泄而微陽亦亡非大劑以扶陽則束手待斃矣內經曰陽之氣以天地之疾風名之陽之汗以天地之雨名之故用附子薑桂以生陽之氣麻黃細辛以發陽之汗甘草大棗以培胃脘之陽使心下之水飲外達於皮毛必如蟲行皮中而堅大如盤者始散此一汗而營衛之氣通腹中之輪轉猶如急風暴雨不終朝而天朗氣清如故也蓋氣為陽水為陰又氣為水母陽旺則水精四布而氣化為汗陽虛則陰氣凝結水不化而為積矣今人凡遇此證非用峻劑以利水即香燥以行氣於先聖大法畏而遠之寧死而不敢服可勝道哉此與傷寒結胸證同而病則異傷寒誤下因邪氣內陷是陽為陰鬱而水不行故用硝黃甘遂苦寒之品以下之此因寒邪內結陽衰而氣不化所謂自傷氣之削也故於桂枝湯去芍藥之微寒合麻辛附之辛熱以汗之難經曰陽盛陰虛汗之則死下之而愈陰盛陽虛下之則死汗出而愈毫釐千里可勿慎與小建中湯治傷寒表未解或心悸而煩或腹中急痛而脈陽澀陰弦者桂枝三兩芍藥六兩甘草三兩生薑三兩大棗十二枚膠飴一升上六味水七升煮取三升去滓納膠飴更上微火消解分三服柯韻伯曰桂枝湯為治表而設佐以芍藥者以自汗故耳自汗本表證而所以自汗者因於煩煩則由裡熱也此湯倍芍藥加膠飴名曰建中則固為里劑矣然由傷寒內熱雖發而外寒未除勢不得去桂姜以未離於表而急於建中故以小名之其劑不寒不熱不補不瀉惟甘以緩之微酸以收之故名曰建耳所謂中者有二一心中悸而煩煩則為熱悸則為虛是方辛甘以散太陽之熱酸苦以滋少陰之虛是建膻中之宮城也一腹中急痛急則為熱痛則為虛是方辛以散厥陰之邪甘以緩肝家之急苦以瀉少陽之火酸以致太陰之液是建中州之都會也若夫中氣不足勞倦所傷非風寒外襲者金匱加黃耆以固腠理而護皮毛則亡血失精之症自寧此陽密乃固之理也五苓散附茵陳五苓散治脈浮小便不利熱微消渴者發汗已脈浮數煩渴者中風發熱六七日不解而煩有表裡症渴欲飲水水入則吐者茯苓十八銖豬苓十八銖白朮十八銖澤瀉一兩桂枝五錢上五味為末以白飲和服方寸匕日三服程郊倩曰標邪傳入膀胱是為犯本其人必渴必小便不利宜可消水矣此傷寒五苓論乃一症以水入則拒而吐一症以水入則消何居膀胱為津液之腑熱入而蓄邪水致小便不利也是則水氣挾熱而上升必至格水此渴欲飲水水入則吐也用五苓者取其開結利水也水泉不致留結邪熱從小便出矣若熱微消渴是則熱入膀胱而燥其津液乃成消渴此膀胱無邪水之蓄亦用五苓者以化氣回津也使膀胱之氣騰化故渴亦止而病愈一取開結利水一取化氣回津盡太陽犯本之治矣然症必以脈浮數煩渴為脈表症里知非陽明之裡而仍為太陽之裡故以五苓主之也趙羽皇曰人身之水有二一為真水一為客水真水者即天乙之所主客水者即食飲之所溢故真水惟欲其升客水惟欲其降若真水不升則水火不交而為消渴客水不降則水土相混而為腫滿此雜症五苓論五苓散一方為行膀胱之水而設亦為逐內外水飲之首劑也五苓與真武湯對看五苓行客水之有餘真武護真水之不足皆所以行水也不可不知蓋水液雖注於下焦而三焦俱有所統故肺金之治節有權脾土之轉輸不怠腎關之開合得宜則溲溺方能按時而出若肺氣不行則高源化絕中州不運則陰水泛流坎臟無陽則層冰內結水終不能自行不明其本而但理其標可乎方用白朮以培土土旺而陰水有制也茯苓以益金金清而通調水道也桂味辛熱且達下焦味辛則能化氣性熱專主流通州都溫暖寒水自行再以澤瀉豬苓之淡滲者佐之禹功可奏矣先哲有曰水之得以安流者土為之堤防也得以長流者火為之蒸動也無水則火不附無火則水不行旨哉言乎羅東逸曰傷寒之用五苓允為太陽寒邪犯本熱在膀胱故以五苓利水瀉熱然用桂枝者所以宣邪而仍治太陽也雜症之用五苓者特以膀胱之虛寒水為壅茲必肉桂之厚以君之而虛寒之氣始得運行宣泄二症之用稍異不可不辨加茵陳為茵陳五苓散治酒積黃癉蓋土虛則受濕濕熱乘脾黃色乃見茵陳專理濕熱發黃者所必用也佐以五苓旺中州利膀胱桂為嚮導直達熱所無不克矣越婢湯金匱治風水惡風一身悉腫脈浮不渴續自汗出無大熱者又治里水一身面目黃腫其脈沉小便不利故令病水假如小便不利此亡津液故令渴也越婢加朮湯主之麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩上五味以水六升煮麻黃去沫納諸藥煮取三升分三服惡風加附子一枚炮喻嘉言曰越婢湯者示微發表於不發之方也大率取其通調營衛麻黃石膏二物一甘熱一甘寒合而用之脾偏於陰則和以甘熱胃偏於陽則和以甘寒乃至風熱之陽水寒之陰凡不和於中土者悉得用之何者中土不和則水穀不化其精悍之氣以實營衛營衛虛則或寒或熱之氣皆得壅塞其隧道而不通於表裡所以在表之風水用之而在裡之水兼渴而小便自利者咸必用之無非欲其不害中土耳不害中土自足消患於方萌矣趙以德曰五臟各一其陰陽獨脾胃居中而兩屬之故土不獨成四氣土亦從四維而後成不惟火生而已於是四方有水寒之陰即應於脾風熱之陽即應於胃飲食五味之寒熱凡入於脾胃者亦然一有相干則脾氣不和胃氣不清而水穀不化其精微以行營衛以實陰陽也甘者是土之本味所以脾氣不和和以甘熱胃氣不清清以甘寒麻黃之甘熱走手足太陰經連於皮膚行氣於三陰以祛陰寒之邪石膏之甘寒走手足陽明經達於肌肉行氣於三陽以祛風熱之邪既用其味甘以入土用其寒熱以和陰陽用其性善走以發越脾氣更以甘草和中緩急調二藥相協而成功大棗之甘補脾中之血生薑之辛益胃中之氣惡風者陽虛故加附子以益陽風水者則加朮以散皮膚間水氣發穀精以宣榮衛與麻黃石膏為使引其入土也越婢之名不亦宜乎喻論明析趙說能細剖其理開便後學故兩錄之茵陳蒿湯陽明病發熱但頭汗出身無汗小便不利渴飲水漿此為瘀熱在裡身必發黃腹微滿者本方主之茵陳蒿六兩梔子十四枚大黃二兩水一斗先煮茵陳減六升納二味煮三升去渣分溫三服小便當利尿如皂角汁狀一宿腹減黃從小便去也柯韻伯曰太陽陽明俱有發黃證但頭汗而身無汗則熱不外越小便不利則熱不下泄故瘀熱在裡發黃三湯看得清楚然里有不同肌肉是太陽之裡當汗而發之故用麻黃連翹赤豆湯為涼散法心胸是太陽陽明之裡當寒以勝之用梔子柏皮湯乃清火法腸胃是陽明之裡當瀉之於內故立本方是逐穢法茵陳稟北方之色經冬不凋傲霜凌雪偏受大寒之氣故能除熱邪留結率梔子以通水源大黃以調胃實令一身內外瘀熱悉從小便而出腹滿自減腸胃無傷仍合引而竭之之法此陽明利水之聖劑也仲景治陽明渴飲有四法本太陽轉屬者五苓散微發汗以散水氣大煩燥渴小便自利者白虎加參清火而生津脈浮發熱小便不利者豬苓湯滋陰而利水小便不利腹滿者茵陳湯以泄滿令黃從小便出病情治法胸有成竹矣竊思仲景利小便必用氣化之品通大便必用承氣之味故小便不利者必加茯苓甚者兼用豬苓因二苓為氣化之品而小便由於氣化也茲小便不利不用二苓者何本論云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利小便故也斯知陽明病汗出多而渴者不可用則汗不出而渴者津液先虛更不可用明矣此以推陳致新之茵陳佐以屈曲下行之梔子不用枳樸以承氣與芒硝之峻利則大黃但可以潤胃燥而大便之不遽行可知故必一宿而腹始減黃從小便去而不由大腸仲景立法神奇匪夷所思耳梔子豉湯附加減諸湯治陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重煩躁心中憒憒怵惕懊憹目疼鼻乾不得臥梔子十四枚香豉四合綿裹上二味以水四升先煮梔子得二升半納豉煮取一升半去渣分二服溫進一服得吐止後服若少氣者加甘草二兩若嘔者加生薑三兩若下後心煩腹滿起臥不安者去香豉加厚朴四兩枳實四枚若醫以丸藥下之身熱不去微煩者去香豉加乾薑二兩若身熱發黃者去香豉加甘草一兩黃柏二兩柯韻伯曰太陽以心腹為里陽明以心腹為表蓋陽明之裡是胃實不特發熱惡寒目疼鼻乾汗出身重謂之表一切虛煩虛熱咽燥口苦舌苔腹滿煩躁不得臥消渴而小便不利凡在胃之外者悉是陽明之表也仲景制汗劑是開太陽表邪之出路制吐劑是引陽明表邪之出路所以太陽之表宜汗不宜吐陽明之表當吐不當汗陽明之表當吐此義前人未發太陽當汗而反吐之便見自汗出不惡寒飢不能食朝食暮吐欲飲冷食不欲近衣等證此太陽轉屬陽明之表法當梔子豉湯吐之陽明當吐而不吐反行汗下溫針等法以致心中憒憒怵惕懊憹煩躁舌苔等證然仍在陽明之表仍當梔子豉湯主之所謂汗吐法當如梔子苦能湧泄寒能勝熱其形象心又赤色通心故主治心中上下一切證豆形象腎又黑色入腎制而為豉輕浮上行能使心腹這濁邪上出於口一吐而心腹得舒表裡之煩熱悉解矣所以然者二陰之病發心脾此是心脾熱不是胃家實即所云有熱屬臟者攻之不令發汗之義也急除胃外之熱不致胃家之家即此梔豉湯為陽明解表裡之聖劑矣熱傷氣者少氣加甘草益氣虛熱相搏者多嘔加生薑以散邪若下後而心腹滿起臥不安是熱已入胃便不當吐故去香豉屎未燥硬不宜復下故只用梔子以除煩佐枳樸以泄滿此兩解心腹之妙又小承氣之輕劑也若以丸藥下之心微煩而不懊惱是知寒氣留中而上焦留熱故任梔子以除煩倍乾薑以逐內寒而表熱自解此又寒熱並用為和中解表之劑矣內外熱熾肌肉發黃必須苦甘之劑以調之柏皮甘草色黃而潤助梔子以除內煩而解外熱形色之病仍假形色以通之此皆用梔豉於加減以御陽明表證之變幻也夫梔子之性能屈曲下行不是上湧之劑惟豉之腐氣上蒸心肺能令人吐耳觀瓜蒂散必用豉汁和服是吐在豉而不在梔也此義後人濛濛賴此發明梔子乾薑湯去豉用姜是取其橫散梔子厚朴湯以枳樸易豉是取其下泄皆不欲上越之義二方後概云得吐止後服大背仲景之旨矣看梔了與茵陳柏皮湯俱不言吐病人舊微溏者不可與則梔子之性自明矣豬苓湯治陽明病脈浮發熱渴欲飲水少陰病下利六七日咳而嘔渴心煩不得眠者豬苓茯苓澤瀉滑石阿膠各一兩上五味以水四升先煮四味取二升去滓納阿膠溶溫服七合日三服趙羽皇曰仲景制豬苓湯以行陽明少陰二經水熱然其旨全以益陰不專利水二語便得正旨蓋傷寒在表最忌亡陽而裡虛又患亡陰亡陰者亡腎中之陰與胃家之津液也故陰虛之人不但大便不可輕動即小水亦忌下通倘陰虛過於滲利津液不致耗竭乎方中阿膠養陰生新去瘀於腎中利水即於腎中養陰滑石甘滑而寒於胃中去熱亦於胃家養陰佐以二苓之淡滲者行之既疏濁熱而不留其瘀壅亦潤真陰而不苦其枯燥源清而流有不清者乎顧太陽利水用五苓者以太陽職司寒水故急加桂以溫之是暖腎以行水之也陽明少陰之用豬苓以二經兩關津液特用阿膠滑石以潤之是滋養無形以行有形也妙義環生利水雖同寒溫迥別惟明者知之白虎湯治陽明症汗出渴欲飲水脈洪大浮滑不惡寒反惡熱石膏一斤碎綿裹知母六兩甘草二兩炙粳米六合上五味以水一斗煮米熟湯成去滓服一升日三服柯韻伯曰邪入陽明故反惡熱熱越故汗出因邪熱爍其精液故渴欲飲水邪盛而實故脈洪大半猶在經故兼浮滑然火炎土燥終非苦寒之味所能治經曰甘先入脾又曰以甘瀉之以是知甘寒之品乃瀉胃火生津液之上劑也石膏甘寒寒勝熱甘入脾又質剛而主降備中土生金之體色白通肺質重而含脂具金能生水之用故以為君知母氣寒主降苦以泄肺火辛以潤腎燥故為臣甘草為中宮舟楫能土中瀉火寒藥得之緩其寒使沉降之性皆得留連於胃粳米氣味溫和稟容平之德作甘稼穡得二味為佐陰寒之物庶無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自解矣更加人參以補中益氣而生津協和甘草粳米之補承製石膏知母之寒瀉火而土不傷乃操萬全之術者白虎加人參湯治太陽中熱汗出惡寒身熱而渴者暍是也知母六兩石膏一斤甘草二兩粳米六合人參三兩上五味以水如前煮服法趙以德曰汗出惡寒身熱而不渴者中風也汗出惡寒而渴者中暍也其症相似獨以渴不渴為辨然傷寒中風則皆有背微惡寒與時時惡風而渴者亦以白虎人參湯治之蓋為火酷肺金肺主氣者也肺傷則衛氣虛衛虛則表不足由是汗出身熱惡寒內經曰心移熱於肺傳為膈消消膈則渴皆相火傷肺所致可知其要在救肺也石膏能治三焦火熱功多於清肺退肺中之火是用為君知母亦就肺中瀉心火滋水之源人參生津益所傷之氣而為臣粳米甘草補土以資金為佐也大小二承氣湯合論大承氣湯治陽明病潮熱手足濈然汗出譫語汗出多胃燥獨語如見鬼狀喘冒不能臥腹滿痛脈滑實又目中不了了睛不和又少陰病初得之口燥咽乾者自利清水色純青心下痛口燥舌乾者六七日腹脹不大便者大黃四兩酒洗厚朴半斤枳實五枚炙芒硝三錢上四味以水一斗先煮二物取五升納大黃煮取二升去滓納芒硝再上火微煮三沸分溫再服得下即停後服小承氣湯大黃四兩厚朴二兩炙去皮枳實三枚上三味以水四升煮取一升二合去滓分溫三服初服湯當大便不爾再服以利為度得便即止服柯韻伯曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黃是氣藥為君名大承氣大黃倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大泄下也因名曰大味寡性緩制小其服欲微和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮樸枳取五升去滓納大黃再煮取二升納芒硝何哉蓋生者氣銳而先行熟者氣純而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳樸除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見仲景微和之意也喻嘉言曰金匱治痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯乃死裡求生之法也靈樞謂熱而痙者死腰折瘛瘲齒齘也茲所云臥不著席即腰折之變文腳攣急即瘛瘲之變文且齘齒加以胸滿口噤上中下三焦熱邪充斥死不旋踵矣在傷寒症腹滿可下胸滿則不可下然投是湯者須知所謂胸滿謂其邪尚在表故不可下存此條為下能存陰之一證此證入里之熱極深極重匪可比倫況陽熱至極陰血立至消亡即小小下之尚不足以勝其陽救其陰故取此湯以承領其一線之陰氣陰氣不盡為陽熱所劫因而得生者多矣可與二字甚活臨症酌而用之初非定法也既有下之重傷其陰之大戒復有下之急救其陰之活法學者欲為深造端在此矣桃仁承氣湯治血結胸中手不可近或中焦蓄血寒熱胸滿漱水不欲咽善忘昏迷如狂者此方治敗血留經通月事桃仁半兩大黃一兩硝三錢桂三錢甘草三錢上每服一兩薑水煎服抵當湯並丸治傷寒蓄血並治癥瘕追蟲攻毒甚佳水蛭熬虻蟲去翅足各三十枚桃仁二十枚大黃三兩酒洗上四味水五升煮取三升去滓溫服一升不下再服即以四味搗粉為丸分四丸以水一升煮一丸取七合服之醉時當下血若不下者更服柯韻伯曰膀胱為水府血本無所容蓄者也然太陽為諸陽主氣是氣之最多者而其經則又多血少氣則知太陽在表陽分之氣多而在經血分之氣反少也少氣者膀胱之室熱結硬滿法當小便不利而反利者是太陽上焦之氣化行而下焦血海之氣化不行可知必其隨經之營血因瘀熱而結於裡矣此為小腹之裡而非膀胱之裡故小便雖利而硬滿急結蓄血仍瘀於小腹也熱淫於內神魂不安故發狂血瘀不行則營不運故脈微而沉營不運則氣不宣故沉而結也營氣不周於身則身黃消穀善飢者胃火熾盛也大便反易者血之濡也色黑者蓄血滲入也善忘者血不營智不明也此皆瘀血之徵兆非至峻之劑不足以抵其巢穴而當此重任故立抵當湯蛭蟲之善飲血者而利於水虻蟲之善吮血者而猛於陸並舉水陸之善取血者以攻之同氣相求更佐桃仁之苦甘推陳致新大黃苦寒盪滌邪熱此名抵當也若熱雖盛而未狂小腹滿而未硬宜小其制為丸以緩治之若外症已解小腹急結其人如狂是轉屬陽明用調胃承氣加桃仁桂枝之行血者於其中以微利之胃和則愈矣此桃仁承氣又為治之緩也小柴胡湯治傷寒五六日寒熱往來胸脅苦滿嘿嘿不欲飲食心煩喜嘔耳聾脈數此是少陽經半表半裡之症宜此湯和解之柴胡半斤黃芩人參甘草各三兩半夏半升生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半加栝蔞根四兩若腹中痛去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩心下悸小便不利者去黃芩加茯苓四兩不渴外有微熱者去人參加桂枝三兩溫覆取微汗咳者去人參大棗生薑加五味子半升乾薑二兩程郊倩曰方以小柴胡名者配乎少陽而取義至於制方之旨及加減法則所云上焦得通津液得下胃氣因和盡之矣何則少陽脈循脅肋在腹陽背陰兩岐間在表之邪欲入里為裡氣所拒故寒往而熱來表裡相拒而留於岐分故胸脅苦滿神識以拒而昏困故嘿嘿木受邪則妨土故不欲食膽為陽木而居清道為邪所郁火無從泄逼炎心分故心煩清氣鬱而為濁則成痰滯故喜嘔嘔則木火兩舒故喜之也此則少陽定有之症其餘或之云者以少陽在人身為遊部凡表裡經絡之罅皆能隨其虛而見之不定之邪也據症皆是太陽經中所有者特以五六日上見故屬之少陽半表半裡兼而有之方是小柴胡症方中柴胡以疏木使半表之邪得從外宣黃芩清火使半里之邪得從內徹半夏能開結痰豁濁氣以還清人參能補久虛滋肺金以融木甘草和之而更加薑棗助少陽生髮之氣使邪無內向也至若煩而不嘔者火成燥實而逼胸故去人參半夏加栝蔞實渴者燥已耗液而逼肺故去半夏加栝蔞根腹中痛木氣散入土中胃陽受困故去黃芩以安土加芍藥以戢木脅下痞硬者邪既留則木氣實故去大棗之甘而緩加牡蠣之咸而軟也心下悸小便不利者土被侵則木氣逆故去黃芩之苦而伐加茯苓之淡而滲也不渴身有微熱者半表之寒尚滯於肌故去人參加桂枝以解之咳者半表之寒湊入於肺故去參棗加五味子易生薑為乾薑以溫之雖肺寒不減黃芩恐木寡於畏也總之邪在少陽是表寒裡熱兩郁不得升之故小柴胡之治所謂升降浮沉則順之也大柴胡湯治熱結在內往來寒熱者柴胡半斤半夏半斤黃芩三兩芍藥三兩枳實四枚生薑五兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎溫服一升日三服柯韻伯曰此熱結在氣分不屬有形故十餘日復能往來寒熱也若熱結在胃則蒸蒸發熱不復知有寒矣往來寒熱故倍生薑佐柴胡以解表結熱在裡故去參甘之溫補加枳芍以破結按大柴胡是半表半裡氣分之下藥並不言及大便硬與不大便其心下急心下痞硬是病在胃口而不在胃中結熱在裡不是結熱在胃且下利則地道已通仲景不用大黃之意曉然若以下之二字妄加大黃不亦謬乎大小柴胡俱是兩解表裡之劑大柴胡主下小柴胡主和和無定體故小柴胡除柴胡甘草外皆可進退下有定局故大柴胡無加減法也柴胡桂枝湯傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結此太陽少陽並病也柴胡桂枝各半湯主之柴胡四兩黃芩人參生薑芍藥桂枝各一兩半甘草一兩半夏二合半大棗六枚上九味水煎服柯韻伯曰柴桂二湯皆是調和之劑桂枝湯重解表而微兼清裡柴胡湯重調里而微兼散表桂枝本為太陽表邪設又可用以調諸經之表小柴胡為少陽半表立法亦可用以調三陽之半表仲景書中最重此二方故於六經病外獨桂枝證柴胡證之稱見二方之任重不拘於經也善讀古人書者其落眼自別如陽浮陰弱條是仲景自為桂枝證之註釋血弱氣虛條亦仲景自為柴胡證之註釋桂枝有壞病柴胡亦有壞病桂枝有疑似證柴胡亦有疑似證病如桂枝證而實非若腳攣急與胸中痞硬者是矣病如柴胡證而實非如本渴而飲水嘔食谷嘔與但欲嘔胸中痛微溏者是矣此條為傷寒六七日正寒熱當退之時反見發熱惡寒諸表證更兼心下支結諸里證表裡不解法當表裡雙解之然惡寒微則發熱亦微可知支節煩疼則一身骨節不疼可知微嘔心下亦微結故謂之支結表證雖不去而已輕里證雖已見而未甚故取桂枝之半以散太陽未盡之邪取柴胡之半以解少陽微結之證口不渴身有微熱者當去人參以六七日來邪雖不解而正氣已虛故仍用人參以和之也外證雖在而病機已見於里故方以柴胡冠桂枝之前為雙解兩陽之輕劑桂枝加芍藥加大黃二湯本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之桂枝芍藥甘草生薑大棗即桂枝湯倍芍藥三兩大實痛者即原方加大黃二兩煎法如前柯韻伯曰腹滿為太陰陽明俱有之證然位同而職異太陰主出太陰病則腐穢之出不利故滿而時痛陽明主內陽明病則腐穢燥而不行故大實而痛大實痛是陽明病不是太陰病二條向來濛濛得韻伯此論如白日麗空矣仲景因表症未解陽邪已陷入於太陰故倍芍藥以益脾而除滿痛此用陰和陽法也若表邪未解而陽邪陷入於陽明則加大黃以潤胃而除其大實痛此雙解表裡法也凡妄下必傷胃氣胃氣虛則陽邪襲陰故轉屬太陰胃液涸則兩陽相搏故轉屬陽明屬太陰則腹滿時痛而不實陰道虛也屬陽明則腹大實而痛陽道實也陽明太陰之辯井然滿而時痛是下利之兆大實而痛是燥屎之徵故加芍藥小變建中之劑加大黃微示調胃之方麻黃附子細辛湯治少陰病始得之發熱脈沉無里證者麻黃一兩附子一枚炮細辛二兩上三味以水一斗先煮麻黃減二升去沫納藥取三升去滓溫服一升日三服熱微者以甘草易細辛微發汗柯韻伯曰少陰主裡應無表證病發於陰應有內熱今始受寒邪即便發熱而里無熱似乎太陽而屬之少陰者以頭不痛而但欲寐也蓋少陰為太陽之雌大言陰與陽小言夫與婦兩相須也論之明斷較若觀火太陽陽虛則不能主外內傷真陰之氣便露出少陰之底板少陰陰虛則不能主內外傷太陽之氣便假借太陽之面目此陰陽表裡雌雄相輸應之機耳陰陽疑似之際症難辨而脈可憑內經曰逆冬氣則少陰不藏腎氣獨沉故身雖熱而脈則沉也所以太陽病而脈反沉便用四逆以急救其里此少陰病而表反熱便於表劑中加附子以豫固其里何以故腎家坎象二陰不藏則一陽無蔽陰邪始得以內侵孤陽因之以外越耳且開且固本方妙義如此夫發熱無汗太陽之表不得不開沉為在裡少陰之樞又不得不固設用麻黃開腠理細辛散浮熱而無附子以固元陽則少陰之津液越出太陽之微陽外亡去生便遠惟附子與麻黃並用則寒邪散而陽不亡精自藏而陰不傷此里病及表脈沉而當發汗者與病在表脈浮而發汗者逕庭也若表微熱則受寒亦輕故以甘草易細辛而微發其汗甘以緩之與辛以散之者又少間矣乾薑附子茯苓四逆二方下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之乾薑一兩附子一枚去皮破八片生用上二味以水三升頓服發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓六兩人參一兩甘草二兩炙乾薑一兩半附子一枚去皮生用上五味以水五升煮三升溫服七合日三服柯韻伯曰二條皆太陽壞病轉屬少陰者也凡太陽病而妄汗妄下者其變證或仍在太陽或轉屬陽明或轉系少陽或系在太陰若汗後復下或下後復汗誤而又誤則轉屬少陰矣少陰為太陽之裡是太陽之根蒂也太陽以陽為主若治不如法陽盛則屬陽明陽衰則屬少陽陽虛則屬太陰此陽亡故轉屬少陰耳直抉所以然誰能道一字脈在少陰則沉微邪入少陰則煩躁煩躁雖六經俱有而多見於太陽少陰者太陽為真陰之標少陰為真陽之本也未經汗下而煩躁屬太陽是煩為陽盛躁為陰虛矣汗下後而煩躁屬少陽是煩為陽虛躁為陰極矣陰陽不相附故煩躁而煩躁之中又當以汗下之先後表證之解不解為之詳辨則陰陽之差多差少不致混淆而用方命劑無纖毫之失也夫先汗後下於法為順而表仍不解是妄下亡陰陰陽俱虛而煩躁也制茯苓四逆固陰以收陽先下後汗於治為逆而表證反解內不嘔渴似乎陰陽自和而實妄汗亡陽所以虛陽擾於陽分晝則煩躁不得安陽虛不得入於陰故脈沉微而夜靜是真陽將脫而煩躁也用乾薑附子固陽以配陰方議妙極同一煩躁所用之方不同如此薑附者陽中陽也生用則力更銳不加甘草則勢更猛矣是方比四逆為峻回陽當急也茯苓感太和之氣化不假根苗而成能補先天無形之氣安虛陽外脫之煩故以為君人參能回元氣於無何有之鄉通血脈於細微欲絕之際故以為佐是方以人參佐茯苓補下焦之元氣以乾薑配生附回下焦之元陽調以炙草之甘比四逆為緩固里宜緩也一去甘草一加參苓而緩急自別用方之神乎急緩二議開後學心胸旋覆代赭湯治汗吐下解表後心下痞硬噫氣不除旋覆花三兩代赭石一兩人參二兩甘草炙三兩生薑五兩大棗十二枚半夏半升上七味以水一斗煎減半去滓再煎取三升溫服日三服羅東逸曰仲景此方治正虛不歸元而承領上下之聖方也蓋發汗吐下解表後邪雖去而胃氣之虧損亦多胃氣既虧三焦因之失職陽無所歸而不升陰無所納而不降是以濁邪留滯伏飲為逆故心下痞硬噫氣不除方中以人參甘草養正補虛薑棗和脾養胃所以安定中州者至矣更以代赭石得土氣之甘而沉者使之斂浮鎮逆領人參以歸氣於下旋覆之辛而潤者用之開肺滌飲佐半夏以蠲痰飲於上苟非二物承領上下則何能使噫氣不除者消心下硬自除乎觀仲景治下焦水氣上凌振振欲擗地者用真武湯鎮之利在下焦者下元不守用赤石脂禹餘糧固之此胃虛在中氣不得下復用此法領之而胸中轉否為泰其為歸元固下之法各極其妙如此赤石脂禹餘糧湯主治久痢不止大腸虛脫服理中丸而利益甚者赤石脂禹餘糧各一斤俱搗碎上二味以水六升煮取二升去渣分溫三服柯韻伯曰甘薑參術可以補中宮元氣之虛而不足以固下焦脂膏之脫此利在下焦者概不得以理中之劑收功矣議不可奪然大腸之不固仍責在胃關門之不閉仍責在脾土虛不能制水仍當補土今補土而土不受補者非治法之謬也當知稟甲乙之氣者終不若稟戊己之化者能培土製水之為得當也石者土之剛也二石皆土之精氣所結石脂色赤入丙助火以生土餘糧色黃入戊實胃而澀腸急以治下焦之標者實以培中宮之本也要知此證土虛而火不虛故不宜於薑附仲景曰複利不止者當利其小便可知與桃花湯別成一局矣真武湯治少陰水氣為患腹痛下利四肢沉重疼痛小便不利其人或咳或嘔或小便利而下利者用此加減白朮二兩茯苓白芍各三兩大附子一枚炮生薑三兩上五味以水八升煮取三升去滓溫服七合日三服趙羽皇曰人之一身陰陽是也上焦屬陽而主心肺下焦屬陰而主肝腎肝藏陰血腎兼水火真武一方為北方行水而設用三白者以其燥能治水淡能伐腎邪而利於水酸能泄肝木以疏水故也附子辛溫大熱必用為佐者何居蓋水之所制者脾水之所行者腎也腎為胃關聚水而從其類倘腎中無陽則脾之樞機雖運而腎之關門不開水雖欲行孰為之主故脾家得附子則火能生土而水有所歸矣腎中得附子則坎陽鼓動而水有所攝矣更得芍藥之酸以收肝而斂陰氣陰平陽秘矣若生薑者並用以散四肢之水氣而和胃也蓋五苓散行有餘之水真武行不足之水兩者天淵總之脾腎雙虛陰水無制而泛溢妄行者非大補坎中之陽大健中宮之氣即日用車前木通以利之豈能效也柯韻伯曰坎宮火用不宣故腎家水體失職是下焦虛有寒不能制水故也法當壯元陽以消陰翳逐留垢以清水源因立此湯方後立加減法是真武加減證不是主症雖皆水氣為患而不屬少陰其云若咳者是水氣射肺所致加五味子之酸溫佐芍藥以收腎中水氣細辛之辛溫佐生薑以散肺中水氣小便自利而下利是胃中無陽則腹痛不屬相火四肢困於脾濕故去芍藥之酸寒加乾薑之辛熱即茯苓之甘平者亦去之此為溫中之劑而非利水之劑矣若嘔者是水氣在中故中焦不治四肢不利病不涉少陰由於太陰濕化不宣也不須附子之溫腎倍加生薑以散邪此為和中之劑而非下焦之劑矣附子芍藥茯苓白朮四味皆真武所重若去一味便不是真武仲景論證治多觸類旁通並不畫地為界喻嘉言曰亡陽而用真武以救之者蓋真武北方司水之神方中四味是行水收陰崇土回陽之劑故能收拾分馳離絕之陰陽互鎮於北方少陰之位也蓋人身陽根於陰真陽飛越亟須鎮攝歸根耳黃連阿膠湯治少陰病得之二三日心中煩不得臥黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三藥取二升去滓納膠溶小冷納雞子黃攪令相得溫服七合日三服柯韻伯曰此少陰之瀉心湯也凡瀉心必藉連芩而導引有陰陽之別病在三陽胃中不和而心下痞硬者虛則加參甘補之實則加大黃下之病在少陰而心中煩不得臥者既不得用參甘以助陽亦不得用大黃以傷胃矣用連芩以直折心火佐芍藥以收斂神明所以扶陰而抑陽也然以但欲寐之病情而至不得臥以微細之病脈而反見心煩非得氣血之屬以交合心腎甘平之品以滋陰和陽不能使水升而火降若苦從火化而陰火不歸其部手少陰之熱不除雞子黃稟離宮之火色入通於心可以補心中之血用生者攪和取潤下之義也驢皮稟北方之水色入通於腎可以補坎宮之精濟水內合於心而性急趨下與之相溶而成膠是降火歸原之妙劑也經曰火位之下陰精承之陰平陽秘精神乃治斯方之謂歟當歸四逆湯手足厥冷脈細欲絕者主之若其人內有久寒加吳萸生薑當歸桂枝芍藥各三兩細辛甘草通草各二兩大棗二十五枚上七味以水八升溫服一升日三服柯韻伯曰此厥陰初傷於寒發散表寒之劑凡厥陰傷寒則脈微而厥以厥陰為兩陰之交盡又名陰之絕陽傷於寒則陰陽之氣不相順接便為厥厥者手足逆冷是也然相火寄於厥陰之臟經雖寒而臟不寒故先厥者後必發熱所以傷寒初起見其手足厥冷脈細欲絕者不得遽認為虛寒而用薑附耳此方取桂枝湯君以當歸者厥陰主肝為血室也倍加大棗者肝苦急甘以緩之即小建中加飴法肝欲散急食辛以散之細辛甚辛通三陰氣血外達於毫端力比麻黃用以代生薑不欲其橫散也與麻黃湯不用同義通草能通關節用以開厥陰之闔當歸得芍藥生血於中大棗同甘草益氣於裡桂枝得細辛而氣血流經緩中以調肝則營氣得至太陰而脈自不絕溫表以逐邪則衛氣得行四末而手足自溫不須參苓之補不用薑附之峻此厥陰四逆與太少不同治仍不失辛甘發散之理斯為厥陰傷寒表劑歟若其人內有久寒非發散之品所能兼治茱萸辛熱猛於細辛能直通厥陰之臟仍加生薑之橫散淫氣於筋筋脈不沮弛則氣血如故是又救厥陰內外兩傷於寒之法也程郊倩曰少陰所主者氣厥則為寒當納氣歸腎厥陰所主者血厥則為虛當溫經復營此大法也吳茱萸湯治厥陰病乾嘔吐涎沫頭痛者少陰症吐利手足厥冷煩躁欲死者陽明食谷欲嘔者吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升溫服七合日三服羅東逸曰仲景救陽諸法於少陰四逆湯必用薑附通脈四逆湯加乾薑分兩其附子生用附子湯又加生附至二枚所以然者或壯微陽使外達或招飛陽使內返或如斷鰲立極以鎮元陽之根柢此在少陰真陽命蒂故以回陽為亟也至其治厥陰則易以吳茱萸而並去前湯諸藥獨用人參薑棗有故蓋人身厥陰肝木雖為兩陰交盡而九地一陽之真氣實起其中此謂生陽此之真氣大虛則三陰濁氣直逼中上不惟本經諸症悉具將陽明之健運失職以至少陰之真陽浮露且吐利厥逆煩躁欲死食谷欲嘔種種叢生矣吳茱萸得東方震氣辛苦大熱能達木鬱又燥氣入肝為能直入厥陰招其垂絕不升之生陽以達上焦故必用以為君而又慮無真元氣以為之合則一陽不徒升也於是去藥之燥滲酸瀉與偏陽亢氣者擇人參之清和而大任之以固元和陽為之輔取薑棗和胃而行四末獨用人參當著眼斯則震坤合德木火土同氣以成一陽之妙用而足三陰之間皆成生生之氣矣諸症有不退者乎蓋仲景之法於少陰重固元陽於厥陰則重護生氣學者當深思而得之矣王又原曰少陰厥陰俱有躁煩少陰之躁在水由龍火不歸故薑附得而陽回厥陰之躁在木惟雷火上逆若用薑附是益其震烈耳故厥陰躁煩多死證非少陰比也兩處煩躁合併為一從木拈出白頭翁湯治厥陰熱利下重脈沉弦渴欲飲水者白頭翁三兩黃連黃柏秦皮各二兩上四味水煎服柯韻伯曰三陰俱有下利證自利不渴者屬太陰是臟有寒也自利渴者屬少陰以下焦虛寒津液不升故引水自救也惟厥陰下利屬於熱以厥陰主肝而司相火肝旺則氣上撞心火鬱則熱利下重濕熱穢氣奔逼廣腸魄門重滯而難出內經云暴注下迫者是矣脈沉為在裡弦為肝脈是木鬱之徵也渴欲飲水厥陰病則消渴也白頭翁臨風偏靜長於驅風用為君者以厥陰風木風動則木搖而火旺欲平走竅之火必寧搖動之風秦皮木小岑高得清陽上升之象為臣是木鬱達之所以遂其發陳之性也黃連瀉君火可除上焦之渴是苦以發之黃柏瀉相火可止下焦之利是苦以堅之也治厥陰熱利有二初利用此方以升陽散火是謂下者舉之寒因熱用法久利則用烏梅丸之酸以收火佐以苦寒雜以溫補是謂逆之從之隨所利而行之調其氣使之平也四逆通脈四逆湯四逆湯治脈沉厥逆等證甘草二兩炙乾薑一兩附子一枚生上三味以水三升煮取一升二合溫服通脈四逆湯治少陰下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者厥陰下利清穀裡寒外熱汗出而厥者亦主之乾薑三兩強人可四兩甘草三兩炙附子一枚生上三味以水三升煮取一升二合溫服加減法面赤色者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參一兩王又原曰仲景真武湯一方於水中補火四逆與通脈四逆二方是於水中溫土二方用藥無異分兩不同主治又別所以然者前方脈沉為陽氣不鼓四逆為陽微不周然真陽未盡亡也君以炙草之甘溫溫養微陽臣以乾薑附子之辛溫通關節走四肢此因內陽微而外寒甚故製為陽氣外達之劑後方裡寒外熱渾是腎中陰寒逼陽於外故君以乾薑樹幟中宮臣以國老主持中外更以附子大壯元陽共招外熱返之於內蓋此時生氣已離存亡俄頃若以柔緩之甘草為君何能疾呼外陽故易以乾薑然必加甘草與乾薑等分者恐喪亡之餘薑附子之猛不能安養夫元氣所謂有制之師也陽微於裡主以四逆陽格於外主以通脈脈若內外俱寒則又為附子湯證而非二方所主矣其加減法內面色赤者加蔥後人遂以蔥白為通脈四逆不知陽亡於外更用蔥以助其散則氣從汗出而陽無由內返也豈不誤耶蓋白通立名因下利脈微用蔥白以通上下之陽此裡寒外熱用通脈以通內外之陽故主方不用蔥也宜詳辨之麻黃杏仁甘草石膏湯溫熱內發表裡俱熱頭痛身疼不惡寒反惡熱無汗而喘大煩大渴脈陰陽俱浮者用此發汗而清火若脈浮弱沉緊沉細惡寒惡風汗出而不渴者禁用麻黃四兩杏仁五十枚甘草炙二兩石膏半斤上四味煎服同麻黃湯法柯韻伯曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以招禍故青龍以惡寒脈緊用薑桂以扶衛外之陽白虎以汗後煩渴用粳米以存胃脘之陽也此但熱無寒佐以薑桂則脈流急疾斑黃狂亂作矣加以粳米則食入於陰長氣於陽譫語腹脹蒸蒸發熱矣亢則害者承乃制重在存陰者不必慮其亡陽也故於麻黃湯去桂枝之辛熱取麻黃之開杏仁之降甘草之和倍石膏之大寒除內蓄之實熱斯溱溱汗出而內外之煩熱悉除矣程扶生曰此治寒深入肺發為喘熱也汗既出矣而喘是寒邪未盡若身無大熱則是熱壅於肺故以麻黃散邪石膏除熱杏仁利肺於青龍湯內減麻黃去薑桂穩為發散除熱清肺之劑也石膏去熱清肺故肺熱亦可用附子湯治少陰病身痛手足寒骨節痛口中和惡寒脈沉者附子二枚生人參二兩白朮四兩茯苓三兩芍藥三兩上五味以水八升煮取三升去滓分溫服一升日三服柯韻伯曰此仲景溫補之第一方乃正治傷寒之法為少陰固本御邪之劑也夫傷則宜補寒則宜溫而近世治傷寒者皆以寒涼克伐相授受竟亡傷寒二字之名實矣少陰為陰中之陰又為寒水之臟故傷寒之重者多入少陰所以少陰一經最多死證方中用生附二枚者取其力之銳且以重其任也益少火之陽鼓腎間之動氣以御外侵之陰翳則守邪之神有權而呼吸之門有鎖矣身痛自除手足自溫以人參為佐者所以固生氣之原令五臟六腑之有本十二經脈之有根脈自不沉矣三陰以少陰為樞設扶陽而不益陰陰虛而陽無所附非治法之盡善也故用白朮以培太陰之土芍藥以滋厥陰之木茯苓以利少陰之水水利則精自藏而骨節自和矣土安則水有所制木調則水有所生制生則化矣扶陽以散寒益陰以固本此萬全之術其畏而不敢用束手待斃者曷可勝計耶此與麻黃附子湯皆是治少陰表證而有出入之不同內經曰心陰之陰其入於經也從陽部注於經其出者從陰內注於骨發熱脈沉無里證者從陽部注經也身體骨節痛手足寒脈沉者從陰內注於骨也從陽注經是表熱裡寒病從外來故溫而兼散從陰注骨是表寒裡虛病從內出故溫而兼補注經注骨二義從前未發緣未讀內經耳又與真武湯似同而實異倍朮附去姜而用參全是溫補以壯元陽真武湯用生薑而無人參尚是溫散以逐水氣真武湯附子湯異同由此而斷補散之分岐只在一味之轉旋也學者安得將仲景方草草看過參胡三白湯治汗下後虛微少氣發熱口燥去柴胡名人參三白湯人參柴胡白朮白芍白苓姜棗柯韻伯曰汗下后里氣既虛當求之於三陰而表熱復發又當責之三陽三陽以少陽為樞其方以小柴胡三陰以少陰為樞其方以真武法當參合為治然此熱是少陽之虛不得仍作火治故於柴胡方中去黃芩口燥而不嘔故去半夏少氣而僅去甘草者欲其下達少陰也於真武湯中不取附子欲其上通少陽也所藉惟人參故用為君佐白朮以培太陰之母白芍滋厥陰之血茯苓清少陰之水生薑助柴胡散表邪大棗助人參補元氣信為大病後調理之聖劑至當而可法者也若營衛不和則去柴胡用桂枝口渴心煩加麥冬五味輔人參生津止渴心下痞用黃連枳實瀉心不得臥加竹茹泄太陰熱如無表熱並去柴胡名人參三白湯純乎調內矣
